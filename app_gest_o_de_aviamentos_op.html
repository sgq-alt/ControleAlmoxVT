<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Aviamentos por OP</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .kanban-col { min-height: 500px; }
        .glass-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { Settings, Package, Clock, AlertTriangle, CheckCircle, Search, Plus, Edit2, AlertCircle } = window.lucide;

        // Configuração Inicial de Dados (Mocks baseados na proposta)
        const initialSLAHours = 24; 
        const statusOptions = [
            { id: 'pendente', label: 'Pendente', color: 'bg-gray-100 text-gray-800 border-gray-300' },
            { id: 'em_separacao', label: 'Em Separação', color: 'bg-blue-100 text-blue-800 border-blue-300' },
            { id: 'aguardando_compra', label: 'Aguardando Compra', color: 'bg-yellow-100 text-yellow-800 border-yellow-300' },
            { id: 'parcial', label: 'Parcial (Faltam Itens)', color: 'bg-orange-100 text-orange-800 border-orange-300' },
            { id: 'completo', label: 'Kit Completo Separado', color: 'bg-green-100 text-green-800 border-green-300' }
        ];

        const initialOpmData = [
            {
                id: 'sol-001',
                opNumber: 'OP-4599',
                model: 'Camiseta Basic 01',
                faccaoDestino: 'Oficina Costura Rápida',
                requestTime: new Date(new Date().getTime() - (2 * 60 * 60 * 1000)).toISOString(), // 2 horas atrás
                slaDeadline: new Date(new Date().getTime() + (22 * 60 * 60 * 1000)).toISOString(), // 22 horas a frente
                status: 'pendente',
                notes: '',
                completedTime: null,
                items: [
                    { name: 'Botão de Pressão Prata 15mm', qtd: 150, checked: false },
                    { name: 'Etiqueta Interna Composição', qtd: 150, checked: false },
                    { name: 'Tag Papel Kraft', qtd: 150, checked: false }
                ]
            },
             {
                id: 'sol-002',
                opNumber: 'OP-4600',
                model: 'Calça Cargo X',
                faccaoDestino: 'Facção Irmãos Silva',
                requestTime: new Date(new Date().getTime() - (26 * 60 * 60 * 1000)).toISOString(), // 26 horas atrás
                slaDeadline: new Date(new Date().getTime() - (2 * 60 * 60 * 1000)).toISOString(), // Venceu há 2 horas
                status: 'aguardando_compra',
                notes: 'Zíper tratorado 20cm preto em compra (Previsão de entrega do Fornecedor Y: 18/07)',
                completedTime: null,
                 items: [
                    { name: 'Zíper Tratorado Preto 20cm', qtd: 50, checked: false },
                    { name: 'Botão de Massa Preto 24L', qtd: 50, checked: true },
                    { name: 'Etiqueta Externa Borracha', qtd: 50, checked: true }
                ]
            },
            {
                id: 'sol-003',
                opNumber: 'OP-4601',
                model: 'Jaqueta Jeans Y',
                faccaoDestino: 'Lavanderia Azul Lavado',
                requestTime: new Date(new Date().getTime() - (5 * 60 * 60 * 1000)).toISOString(),
                slaDeadline: new Date(new Date().getTime() + (19 * 60 * 60 * 1000)).toISOString(),
                status: 'em_separacao',
                notes: 'Linha pesponto marrom quase no fim.',
                completedTime: null,
                items: []
            },
            {
                id: 'sol-old-001',
                opNumber: 'OP-4450',
                model: 'Blusa Viscose',
                faccaoDestino: 'Interno',
                requestTime: new Date(new Date().getTime() - (72 * 60 * 60 * 1000)).toISOString(),
                slaDeadline: new Date(new Date().getTime() - (48 * 60 * 60 * 1000)).toISOString(),
                status: 'completo',
                notes: 'Separado corretamente e entregue.',
                completedTime: new Date(new Date().getTime() - (26 * 60 * 60 * 1000)).toISOString(), // Concluído há 26 horas
                items: []
            }
        ];

        const formatDateTime = (dateString) => {
            if (!dateString) return '--';
            const date = new Date(dateString);
            return date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
        };

        const calculateSlaStatus = (deadline, completedTime) => {
            const now = new Date();
            const limit = new Date(deadline);
            
            if (completedTime) {
                const comp = new Date(completedTime);
                return comp <= limit ? { status: 'ok', text: 'No Prazo' } : { status: 'late', text: 'Entregue Atrasado' };
            }
            
            if (now > limit) {
                return { status: 'late', text: 'Atrasado' };
            }
            return { status: 'ok', text: 'No Prazo' };
        };

        const App = () => {
            const [ops, setOps] = useState(initialOpmData);
            const [searchTerm, setSearchTerm] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingOp, setEditingOp] = useState(null);
            const [activeTab, setActiveTab] = useState('kanban'); // 'kanban' ou 'list'
            const [userRole, setUserRole] = useState('pcp'); // Controle de Perfil: 'pcp' ou 'almoxarifado'

            // Estado para o formulário de Nova/Edição OP
            const [formData, setFormData] = useState({
                opNumber: '', model: '', faccaoDestino: '', status: 'pendente', notes: ''
            });

            // Recarrega ícones do Lucide sempre que a interface atualizar
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            const handleOpenModal = (op = null) => {
                if (op) {
                    setEditingOp(op);
                    setFormData({
                        opNumber: op.opNumber, model: op.model, faccaoDestino: op.faccaoDestino, status: op.status, notes: op.notes
                    });
                } else {
                    setEditingOp(null);
                    setFormData({ opNumber: '', model: '', faccaoDestino: '', status: 'pendente', notes: '' });
                }
                setIsModalOpen(true);
            };

            const handleCloseModal = () => {
                setIsModalOpen(false);
                setEditingOp(null);
            };

            const handleSaveOp = (e) => {
                e.preventDefault();
                const now = new Date();
                
                if (editingOp) {
                    // Lógica para registrar data de conclusão se mudar para 'completo'
                    let compTime = editingOp.completedTime;
                    if (formData.status === 'completo' && editingOp.status !== 'completo') {
                        compTime = now.toISOString();
                    } else if (formData.status !== 'completo') {
                        compTime = null;
                    }

                    const updatedOps = ops.map(op => 
                        op.id === editingOp.id ? { ...op, ...formData, completedTime: compTime } : op
                    );
                    setOps(updatedOps);
                } else {
                    // Criar nova OP (Gatilho do PCP)
                    const deadline = new Date(now.getTime() + (initialSLAHours * 60 * 60 * 1000));
                    const newOp = {
                        id: `sol-${Date.now()}`,
                        ...formData,
                        requestTime: now.toISOString(),
                        slaDeadline: deadline.toISOString(),
                        completedTime: null,
                        items: []
                    };
                    setOps([...ops, newOp]);
                }
                handleCloseModal();
            };

            const isCompletedAndOld = (op) => {
                if (op.status !== 'completo' || !op.completedTime) return false;
                const completedAt = new Date(op.completedTime).getTime();
                const now = new Date().getTime();
                const hoursPassed = (now - completedAt) / (1000 * 60 * 60);
                return hoursPassed >= 24; // Remove OPs completas há mais de 24 horas
            };

            const visibleOps = ops.filter(op => !isCompletedAndOld(op));

            const filteredOps = visibleOps.filter(op => 
                op.opNumber.toLowerCase().includes(searchTerm.toLowerCase()) ||
                op.model.toLowerCase().includes(searchTerm.toLowerCase()) ||
                op.faccaoDestino.toLowerCase().includes(searchTerm.toLowerCase())
            );

            // Resumo de KPIs (Baseado apenas nas visíveis)
            const totalOps = visibleOps.length;
            const completedOps = visibleOps.filter(op => op.status === 'completo').length;
            const pendingOps = totalOps - completedOps;
            const lateOps = visibleOps.filter(op => calculateSlaStatus(op.slaDeadline, op.completedTime).status === 'late' && op.status !== 'completo').length;

            const renderCard = (op) => {
                const sla = calculateSlaStatus(op.slaDeadline, op.completedTime);
                const statusInfo = statusOptions.find(s => s.id === op.status);

                return (
                    <div key={op.id} className="bg-white p-4 rounded-lg shadow-sm border border-gray-200 mb-3 hover:shadow-md transition-shadow cursor-pointer" onClick={() => handleOpenModal(op)}>
                        <div className="flex justify-between items-start mb-2">
                            <h4 className="font-bold text-gray-800">{op.opNumber}</h4>
                            <span className={`text-xs px-2 py-1 rounded-full font-medium ${sla.status === 'late' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`}>
                                {sla.text}
                            </span>
                        </div>
                        <p className="text-sm text-gray-600 mb-1 font-medium">{op.model}</p>
                        <p className="text-xs text-gray-500 mb-3 flex items-center">
                            <i data-lucide="truck" className="w-3 h-3 mr-1"></i> {op.faccaoDestino || 'Interno'}
                        </p>
                        
                        <div className="text-xs text-gray-500 mb-2 space-y-1">
                            <div className="flex items-center">
                                <i data-lucide="clock" className="w-3 h-3 mr-1"></i> Solicitação: {formatDateTime(op.requestTime)}
                            </div>
                            <div className="flex items-center">
                                <i data-lucide="alert-circle" className="w-3 h-3 mr-1"></i> Prazo: {formatDateTime(op.slaDeadline)}
                            </div>
                        </div>

                        {op.notes && (
                            <div className="mt-2 p-2 bg-gray-50 rounded text-xs text-gray-700 border border-gray-100">
                                <strong>Obs:</strong> {op.notes.length > 60 ? op.notes.substring(0,60) + '...' : op.notes}
                            </div>
                        )}
                        
                        {op.items && op.items.length > 0 && (
                             <div className="mt-2 text-xs text-gray-500">
                                Checklist: {op.items.filter(i=>i.checked).length}/{op.items.length} itens separ.
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header Premium */}
                    <header className="glass-header sticky top-0 z-10 px-6 py-4 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 p-2 rounded-lg">
                                <i data-lucide="package" className="w-6 h-6 text-white"></i>
                            </div>
                            <div>
                                <h1 className="text-xl font-bold text-gray-800 leading-tight">Almoxarifado Flow</h1>
                                <p className="text-xs text-gray-500">Gestão de Aviamentos por OP</p>
                            </div>
                        </div>
                        <div className="flex gap-4 items-center">
                            {}
                            <div className="flex items-center bg-gray-100 p-1 rounded-lg border border-gray-200">
                                <button 
                                    onClick={() => setUserRole('pcp')}
                                    className={`px-3 py-1.5 rounded-md text-xs font-semibold transition-all ${userRole === 'pcp' ? 'bg-white shadow-sm text-blue-700' : 'text-gray-500 hover:text-gray-700'}`}
                                >
                                    PCP
                                </button>
                                <button 
                                    onClick={() => setUserRole('almoxarifado')}
                                    className={`px-3 py-1.5 rounded-md text-xs font-semibold transition-all ${userRole === 'almoxarifado' ? 'bg-white shadow-sm text-blue-700' : 'text-gray-500 hover:text-gray-700'}`}
                                >
                                    Almoxarifado
                                </button>
                            </div>

                            <div className="relative">
                                <i data-lucide="search" className="w-4 h-4 absolute left-3 top-3 text-gray-400"></i>
                                <input 
                                    type="text" 
                                    placeholder="Buscar OP, Modelo..." 
                                    className="pl-9 pr-4 py-2 border border-gray-300 rounded-md text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none w-64"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                            
                            {userRole === 'pcp' && (
                                <button 
                                    onClick={() => handleOpenModal()}
                                    className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center gap-2 shadow-sm">
                                    <i data-lucide="plus" className="w-4 h-4"></i> Nova Solicitação de OP
                                </button>
                            )}
                        </div>
                    </header>

                    {/* Conteúdo Principal */}
                    <main className="flex-1 p-6 overflow-hidden flex flex-col">
                        
                        {/* KPIs Dashboard */}
                        <div className="grid grid-cols-4 gap-4 mb-6">
                            <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex items-center gap-4">
                                <div className="p-3 bg-blue-50 rounded-full text-blue-600"><i data-lucide="file-text"></i></div>
                                <div><p className="text-sm text-gray-500 font-medium">Total de Solicitações</p><p className="text-2xl font-bold text-gray-800">{totalOps}</p></div>
                            </div>
                            <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex items-center gap-4">
                                <div className="p-3 bg-yellow-50 rounded-full text-yellow-600"><i data-lucide="clock"></i></div>
                                <div><p className="text-sm text-gray-500 font-medium">Pendentes no Almox.</p><p className="text-2xl font-bold text-gray-800">{pendingOps}</p></div>
                            </div>
                            <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex items-center gap-4">
                                <div className="p-3 bg-red-50 rounded-full text-red-600"><i data-lucide="alert-triangle"></i></div>
                                <div><p className="text-sm text-gray-500 font-medium">OPs em Atraso (SLA)</p><p className="text-2xl font-bold text-gray-800">{lateOps}</p></div>
                            </div>
                            <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex items-center gap-4">
                                <div className="p-3 bg-green-50 rounded-full text-green-600"><i data-lucide="check-circle"></i></div>
                                <div><p className="text-sm text-gray-500 font-medium">Kits Separados Hoje</p><p className="text-2xl font-bold text-gray-800">{completedOps}</p></div>
                            </div>
                        </div>

                        {/* Kanban Board */}
                        <div className="flex-1 overflow-x-auto overflow-y-hidden pb-4">
                            <div className="flex gap-6 h-full items-start min-w-max">
                                
                                {/* Colunas Kanban baseadas nos Status */}
                                {statusOptions.map(status => {
                                    const colOps = filteredOps.filter(op => op.status === status.id);
                                    return (
                                        <div key={status.id} className="w-80 flex flex-col max-h-full bg-gray-50 rounded-xl border border-gray-200 flex-shrink-0">
                                            <div className="p-3 border-b border-gray-200 flex justify-between items-center bg-gray-100 rounded-t-xl">
                                                <h3 className="font-semibold text-gray-700 text-sm flex items-center gap-2">
                                                    <span className={`w-3 h-3 rounded-full ${status.color.split(' ')[0]}`}></span>
                                                    {status.label}
                                                </h3>
                                                <span className="bg-gray-200 text-gray-600 text-xs py-0.5 px-2 rounded-full font-medium">{colOps.length}</span>
                                            </div>
                                            <div className="p-3 overflow-y-auto flex-1 custom-scrollbar kanban-col">
                                                {colOps.map(op => renderCard(op))}
                                                {colOps.length === 0 && (
                                                    <div className="text-center py-8 text-gray-400 text-sm border-2 border-dashed border-gray-200 rounded-lg">
                                                        Nenhuma OP nesta etapa
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )
                                })}

                            </div>
                        </div>
                    </main>

                    {}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="px-6 py-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                                    <h2 className="text-lg font-bold text-gray-800">
                                        {editingOp ? `Gerenciar OP: ${editingOp.opNumber}` : 'Nova Solicitação de Aviamentos (Sinal Kanban)'}
                                    </h2>
                                    <button onClick={handleCloseModal} className="text-gray-400 hover:text-gray-600">
                                        <i data-lucide="x" className="w-5 h-5"></i>
                                    </button>
                                </div>
                                
                                <div className="p-6 overflow-y-auto flex-1">
                                    <form id="opForm" onSubmit={handleSaveOp} className="space-y-4">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Número da OP *</label>
                                                <input 
                                                    type="text" required
                                                    className="w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none disabled:bg-gray-100 disabled:text-gray-500"
                                                    value={formData.opNumber} 
                                                    onChange={e => setFormData({...formData, opNumber: e.target.value})}
                                                    disabled={!!editingOp || userRole !== 'pcp'}
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Modelo / Referência *</label>
                                                <input 
                                                    type="text" required
                                                    className="w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none disabled:bg-gray-100 disabled:text-gray-500"
                                                    value={formData.model} 
                                                    onChange={e => setFormData({...formData, model: e.target.value})}
                                                    disabled={!!editingOp || userRole !== 'pcp'}
                                                />
                                            </div>
                                        </div>

                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Destino (Facção / Interno) *</label>
                                            <input 
                                                type="text" required placeholder="Ex: Oficina Confecção Esperança"
                                                className="w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none disabled:bg-gray-100 disabled:text-gray-500"
                                                value={formData.faccaoDestino} 
                                                onChange={e => setFormData({...formData, faccaoDestino: e.target.value})}
                                                disabled={userRole !== 'pcp'}
                                            />
                                        </div>

                                        {editingOp && (
                                            <div className="p-4 bg-blue-50 border border-blue-100 rounded-lg">
                                                <h4 className="text-sm font-semibold text-blue-800 mb-3">Ação do Almoxarifado</h4>
                                                <div className="space-y-3">
                                                    <div>
                                                        <label className="block text-sm font-medium text-blue-900 mb-1">Status da Separação *</label>
                                                        <select 
                                                            className="w-full p-2 border border-blue-300 rounded-md focus:ring-blue-500 outline-none bg-white disabled:bg-gray-100 disabled:text-gray-500 disabled:cursor-not-allowed"
                                                            value={formData.status} 
                                                            onChange={e => setFormData({...formData, status: e.target.value})}
                                                            disabled={userRole !== 'almoxarifado'}
                                                        >
                                                            {statusOptions.map(opt => (
                                                                <option key={opt.id} value={opt.id}>{opt.label}</option>
                                                            ))}
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="block text-sm font-medium text-blue-900 mb-1">Observações / Motivo de Atraso (Faltas)</label>
                                                        <textarea 
                                                            rows="3" placeholder="Ex: Zíper na lavanderia, previsão 12/08"
                                                            className="w-full p-2 border border-blue-300 rounded-md focus:ring-blue-500 outline-none bg-white disabled:bg-gray-100 disabled:text-gray-500 disabled:cursor-not-allowed"
                                                            value={formData.notes} 
                                                            onChange={e => setFormData({...formData, notes: e.target.value})}
                                                            disabled={userRole !== 'almoxarifado'}
                                                        ></textarea>
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        {!editingOp && (
                                            <div className="bg-yellow-50 p-3 rounded-md border border-yellow-200 text-sm text-yellow-800 flex items-start gap-2">
                                                <i data-lucide="info" className="w-5 h-5 flex-shrink-0 mt-0.5"></i>
                                                <p>Ao salvar, esta OP entrará na fila do Almoxarifado com o status <strong>Pendente</strong> e um prazo (SLA) de <strong>{initialSLAHours} horas</strong> para separação.</p>
                                            </div>
                                        )}
                                    </form>
                                </div>
                                
                                <div className="px-6 py-4 border-t border-gray-200 bg-gray-50 flex justify-end gap-3 rounded-b-xl">
                                    <button type="button" onClick={handleCloseModal} className="px-4 py-2 border border-gray-300 rounded-md text-gray-700 bg-white hover:bg-gray-50 text-sm font-medium">Cancelar</button>
                                    
                                    {/* Exibe botão Salvar apenas se o usuário tem permissão para a ação atual */}
                                    {((userRole === 'pcp' && !editingOp) || (userRole === 'almoxarifado' && editingOp)) && (
                                        <button type="submit" form="opForm" className="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 text-sm font-medium shadow-sm flex items-center gap-2">
                                            <i data-lucide="save" className="w-4 h-4"></i> Salvar Solicitação
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
