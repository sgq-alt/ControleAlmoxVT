<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almoxarifado Flow - Painel de Aviamentos por OP</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        .kanban-col {
            min-height: calc(100vh - 290px);
        }
        .glass-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK Modular (v11.6.1) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, onSnapshot, collection, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Variáveis de ambiente fornecidas pela plataforma
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'app-aviamentos-flow-v1';
        
        let firebaseConfig;
        let isConfigured = false;

        try {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                firebaseConfig = JSON.parse(__firebase_config);
                isConfigured = true;
            } else {
                // Configuração fallback para testes locais no GitHub Pages ou máquina local
                firebaseConfig = {
                    apiKey: "AIzaSyFakePlaceholderKey-ForLocalRunningOnly",
                    authDomain: "app-aviamentos.firebaseapp.com",
                    projectId: "app-aviamentos",
                    storageBucket: "app-aviamentos.appspot.com",
                    messagingSenderId: "000000000000",
                    appId: "1:00000000:web:00000000"
                };
            }
        } catch (e) {
            console.warn("Erro ao ler configuração do Firebase. Iniciando em modo offline simulado.", e);
        }

        let app, db, auth;
        let databaseOnline = false;

        if (isConfigured) {
            try {
                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                databaseOnline = true;
            } catch (err) {
                console.error("Falha ao inicializar o Firebase.", err);
            }
        }

        // Expondo a API do Firebase de forma segura para o script do React utilizar
        window.FirebaseBridge = {
            db,
            auth,
            doc,
            getDoc,
            setDoc,
            updateDoc,
            deleteDoc,
            onSnapshot,
            collection,
            query,
            signInAnonymously,
            signInWithCustomToken,
            onAuthStateChanged,
            appId,
            isOnline: databaseOnline,
            rawConfig: firebaseConfig
        };
    </script>

    <!-- Script de Aplicação com Babel para React -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { 
            Package, Clock, AlertTriangle, CheckCircle2, Search, Plus, 
            Edit2, AlertCircle, X, Save, Database, Wifi, WifiOff, RefreshCw,
            Check, FileText, Trash2, ShieldAlert, LogOut, Info, UserCheck, ChevronRight
        } = window.lucide;

        // SLA de separação padrão em horas
        const SLA_HOURS_DEFAULT = 24;

        // Opções padronizadas de status conforme acordado nas diretrizes têxteis
        const statusOptions = [
            { id: 'pendente', label: 'Pendente', color: 'bg-slate-100 text-slate-800 border-slate-300' },
            { id: 'em_separacao', label: 'Em Separação', color: 'bg-sky-100 text-sky-800 border-sky-300' },
            { id: 'aguardando_compra', label: 'Aguardando Compra', color: 'bg-amber-100 text-amber-800 border-amber-300' },
            { id: 'parcial', label: 'Parcial (Faltam Itens)', color: 'bg-orange-100 text-orange-800 border-orange-300' },
            { id: 'completo', label: 'Kit Completo Separado', color: 'bg-emerald-100 text-emerald-800 border-emerald-300' }
        ];

        // Dados de simulação iniciais caso o banco de dados esteja offline
        const mockFallbackData = [
            {
                id: 'sol-001',
                opNumber: 'OP-4599',
                model: 'Camiseta Basic Cotton 01',
                faccaoDestino: 'Oficina Costura Rápida',
                requestTime: new Date(new Date().getTime() - (2 * 60 * 60 * 1000)).toISOString(),
                slaDeadline: new Date(new Date().getTime() + (22 * 60 * 60 * 1000)).toISOString(),
                status: 'pendente',
                notes: 'Lote de 500 peças.',
                completedTime: null,
                items: [
                    { id: '1', name: 'Botão de Pressão Prata 15mm', qtd: 1500, checked: false },
                    { id: '2', name: 'Etiqueta de Composição Cetim', qtd: 500, checked: false },
                    { id: '3', name: 'Tag Papel Kraft Reciclado', qtd: 500, checked: false }
                ]
            },
            {
                id: 'sol-002',
                opNumber: 'OP-4600',
                model: 'Calça Cargo Sarja X',
                faccaoDestino: 'Facção Irmãos Silva',
                requestTime: new Date(new Date().getTime() - (26 * 60 * 60 * 1000)).toISOString(),
                slaDeadline: new Date(new Date().getTime() - (2 * 60 * 60 * 1000)).toISOString(),
                status: 'aguardando_compra',
                notes: 'Falta zíper tratorado 20cm preto (Previsão de entrega pelo compras: 24h)',
                completedTime: null,
                items: [
                    { id: '1', name: 'Zíper Tratorado Preto 20cm', qtd: 120, checked: false },
                    { id: '2', name: 'Botão de Massa Preto 24L', qtd: 120, checked: true },
                    { id: '3', name: 'Etiqueta Externa Termocolante', qtd: 120, checked: true }
                ]
            }
        ];

        const App = () => {
            const [ops, setOps] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingOp, setEditingOp] = useState(null);
            const [userRole, setUserRole] = useState('pcp'); // PCP ou Almoxarifado
            const [dbState, setDbState] = useState({ online: false, type: 'Iniciando...' });
            const [userId, setUserId] = useState('usuário-anonimo');
            const [notification, setNotification] = useState(null);
            
            // Itens de checklist dinâmicos do formulário
            const [checklistItems, setChecklistItems] = useState([]);
            const [newItemName, setNewItemName] = useState('');
            const [newItemQtd, setNewItemQtd] = useState('');

            // Estado para o formulário
            const [formData, setFormData] = useState({
                opNumber: '', model: '', faccaoDestino: '', status: 'pendente', notes: ''
            });

            // Gerenciador de Avisos e Toasts
            const showToast = (message, type = 'info') => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 5000);
            };

            useEffect(() => {
                const fb = window.FirebaseBridge;
                
                if (fb && fb.isOnline && fb.db && fb.auth) {
                    // Inicialização real com Firestore
                    const setupFirebase = async () => {
                        try {
                            setDbState({ online: true, type: 'Conectando ao Firestore...' });
                            
                            // 1. Autenticação obrigatória antes das queries
                            let loggedUser = null;
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                const creds = await fb.signInWithCustomToken(fb.auth, __initial_auth_token);
                                loggedUser = creds.user;
                            } else {
                                const creds = await fb.signInAnonymously(fb.auth);
                                loggedUser = creds.user;
                            }
                            
                            if (loggedUser) {
                                setUserId(loggedUser.uid);
                                setDbState({ online: true, type: `Nuvem Ativa (${loggedUser.uid.substring(0, 8)})` });
                                
                                // 2. Escuta de dados em tempo real (Rastro de Solicitados)
                                // Coleção pública conforme as regras de negócio de caminhos rígidos
                                const collectionRef = fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'solicitacoes');
                                
                                // Escuta as mudanças da coleção
                                const unsubscribe = fb.onSnapshot(collectionRef, 
                                    (snapshot) => {
                                        const loadedOps = [];
                                        snapshot.forEach((doc) => {
                                            loadedOps.push({ id: doc.id, ...doc.data() });
                                        });
                                        
                                        // Se o banco estiver novo/vazio, injetamos mocks para demonstração inicial
                                        if (loadedOps.length === 0) {
                                            mockFallbackData.forEach(async (item) => {
                                                await fb.setDoc(fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'solicitacoes', item.id), item);
                                            });
                                        } else {
                                            setOps(loadedOps);
                                        }
                                    }, 
                                    (error) => {
                                        console.error("Erro na escuta em tempo real do Firestore: ", error);
                                        showToast("Erro de permissão ou sincronia de dados na nuvem.", "error");
                                        activateOfflineMode();
                                    }
                                );

                                return () => unsubscribe();
                            }
                        } catch (err) {
                            console.error("Erro de autenticação/conexão com banco:", err);
                            activateOfflineMode();
                        }
                    };

                    setupFirebase();
                } else {
                    // Sem credenciais reais de Firebase no ambiente -> ativa o Modo Offline de Alta Performance
                    activateOfflineMode();
                }
            }, []);

            const activateOfflineMode = () => {
                setDbState({ online: false, type: 'Modo Offline (LocalStorage Ativo)' });
                
                // Carregar do armazenamento local se existir
                const localData = localStorage.getItem('almoxarifado_flow_ops');
                if (localData) {
                    try {
                        setOps(JSON.parse(localData));
                    } catch (e) {
                        setOps(mockFallbackData);
                    }
                } else {
                    setOps(mockFallbackData);
                    localStorage.setItem('almoxarifado_flow_ops', JSON.stringify(mockFallbackData));
                }
            };

            // Salva dados localmente no modo offline caso o Firestore não esteja configurado
            const saveLocalData = (newOpsList) => {
                setOps(newOpsList);
                localStorage.setItem('almoxarifado_flow_ops', JSON.stringify(newOpsList));
            };

            // Recarrega ícones do Lucide após re-render
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            const handleOpenModal = (op = null) => {
                if (op) {
                    setEditingOp(op);
                    setFormData({
                        opNumber: op.opNumber,
                        model: op.model,
                        faccaoDestino: op.faccaoDestino,
                        status: op.status,
                        notes: op.notes || ''
                    });
                    setChecklistItems(op.items || []);
                } else {
                    setEditingOp(null);
                    setFormData({
                        opNumber: '',
                        model: '',
                        faccaoDestino: '',
                        status: 'pendente',
                        notes: ''
                    });
                    setChecklistItems([]);
                }
                setIsModalOpen(true);
            };

            const handleCloseModal = () => {
                setIsModalOpen(false);
                setEditingOp(null);
                setNewItemName('');
                setNewItemQtd('');
            };

            const addChecklistItem = () => {
                if (!newItemName.trim()) return;
                const newItem = {
                    id: `item-${Date.now()}-${Math.random().toString(36).substr(2, 5)}`,
                    name: newItemName.trim(),
                    qtd: parseInt(newItemQtd) || 1,
                    checked: false
                };
                setChecklistItems([...checklistItems, newItem]);
                setNewItemName('');
                setNewItemQtd('');
            };

            const removeChecklistItem = (itemId) => {
                setChecklistItems(checklistItems.filter(item => item.id !== itemId));
            };

            const toggleChecklistItem = (itemId) => {
                setChecklistItems(checklistItems.map(item => 
                    item.id === itemId ? { ...item, checked: !item.checked } : item
                ));
            };

            const handleSaveOp = async (e) => {
                e.preventDefault();
                const now = new Date();
                const fb = window.FirebaseBridge;

                // Segurança: Validação de perfis para garantir o canal formal
                if (!editingOp && userRole !== 'pcp') {
                    showToast("Somente usuários do PCP podem abrir novas solicitações de OP.", "error");
                    return;
                }
                if (editingOp && userRole !== 'almoxarifado') {
                    // Permite ao PCP alterar dados estruturais, mas não o status de separação do almoxarifado
                    if (formData.status !== editingOp.status || formData.notes !== editingOp.notes) {
                        showToast("Apenas o Almoxarifado pode movimentar o status ou adicionar observações de separação.", "error");
                        return;
                    }
                }

                // Cálculo do SLA e Conclusão
                let compTime = editingOp ? editingOp.completedTime : null;
                if (editingOp && formData.status === 'completo' && editingOp.status !== 'completo') {
                    compTime = now.toISOString();
                } else if (editingOp && formData.status !== 'completo') {
                    compTime = null;
                }

                if (editingOp) {
                    const updatedOp = {
                        ...editingOp,
                        ...formData,
                        items: checklistItems,
                        completedTime: compTime,
                        lastModified: now.toISOString()
                    };

                    if (fb.isOnline) {
                        try {
                            const docRef = fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'solicitacoes', editingOp.id);
                            await fb.updateDoc(docRef, updatedOp);
                            showToast(`Solicitação da ${formData.opNumber} atualizada com sucesso!`, "success");
                        } catch (err) {
                            console.error("Falha ao salvar na nuvem:", err);
                            showToast("Erro ao sincronizar atualização na nuvem. Salvando offline.", "warning");
                            const localOps = ops.map(o => o.id === editingOp.id ? updatedOp : o);
                            saveLocalData(localOps);
                        }
                    } else {
                        const localOps = ops.map(o => o.id === editingOp.id ? updatedOp : o);
                        saveLocalData(localOps);
                        showToast(`OP ${formData.opNumber} atualizada localmente!`, "success");
                    }
                } else {
                    // Criação de Nova OP (Canal de Entrada Formal do PCP)
                    const deadline = new Date(now.getTime() + (SLA_HOURS_DEFAULT * 60 * 60 * 1000));
                    const newOpId = `sol-${Date.now()}`;
                    const newOp = {
                        id: newOpId,
                        ...formData,
                        requestTime: now.toISOString(),
                        slaDeadline: deadline.toISOString(),
                        completedTime: null,
                        items: checklistItems,
                        lastModified: now.toISOString()
                    };

                    if (fb.isOnline) {
                        try {
                            const docRef = fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'solicitacoes', newOpId);
                            await fb.setDoc(docRef, newOp);
                            showToast(`Canal de aviamentos aberto para ${formData.opNumber}!`, "success");
                        } catch (err) {
                            console.error("Falha ao salvar nova OP na nuvem:", err);
                            showToast("Erro ao enviar dados. Salvando localmente.", "warning");
                            const localOps = [...ops, newOp];
                            saveLocalData(localOps);
                        }
                    } else {
                        const localOps = [...ops, newOp];
                        saveLocalData(localOps);
                        showToast(`OP ${formData.opNumber} adicionada com sucesso no modo local!`, "success");
                    }
                }
                handleCloseModal();
            };

            // Regra de Negócio: Os kits concluídos e corretos expiram da visualização do Kanban após 24 horas
            const isCompletedAndExpired = (op) => {
                if (op.status !== 'completo' || !op.completedTime) return false;
                const completedAt = new Date(op.completedTime).getTime();
                const now = new Date().getTime();
                const hoursPassed = (now - completedAt) / (1000 * 60 * 60);
                return hoursPassed >= 24; // Some após 1 dia (24h)
            };

            const visibleOps = ops.filter(op => !isCompletedAndExpired(op));

            const filteredOps = visibleOps.filter(op => 
                (op.opNumber && op.opNumber.toLowerCase().includes(searchTerm.toLowerCase())) ||
                (op.model && op.model.toLowerCase().includes(searchTerm.toLowerCase())) ||
                (op.faccaoDestino && op.faccaoDestino.toLowerCase().includes(searchTerm.toLowerCase()))
            );

            const formatDateTime = (dateString) => {
                if (!dateString) return '--';
                const date = new Date(dateString);
                return date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
            };

            const calculateSlaStatus = (deadline, completedTime) => {
                const now = new Date();
                const limit = new Date(deadline);
                
                if (completedTime) {
                    const comp = new Date(completedTime);
                    return comp <= limit ? { status: 'ok', text: 'No Prazo' } : { status: 'late', text: 'Entregue Atrasado' };
                }
                
                if (now > limit) {
                    return { status: 'late', text: 'Atrasado' };
                }
                return { status: 'ok', text: 'No Prazo' };
            };

            // KPIs baseados no fluxo total visível
            const totalSolicitacoes = visibleOps.length;
            const pendentesAlmox = visibleOps.filter(o => o.status !== 'completo').length;
            const atrasadasSla = visibleOps.filter(o => {
                const sla = calculateSlaStatus(o.slaDeadline, o.completedTime);
                return sla.status === 'late' && o.status !== 'completo';
            }).length;
            const completadosHoje = visibleOps.filter(o => o.status === 'completo').length;

            const renderCard = (op) => {
                const sla = calculateSlaStatus(op.slaDeadline, op.completedTime);
                const isOverdue = sla.status === 'late' && op.status !== 'completo';
                
                return (
                    <div 
                        key={op.id} 
                        className={`bg-white p-4 rounded-xl shadow-sm border ${isOverdue ? 'border-rose-300 ring-2 ring-rose-50' : 'border-slate-200'} hover:shadow-md transition-all duration-200 cursor-pointer relative overflow-hidden`}
                        onClick={() => handleOpenModal(op)}
                    >
                        {isOverdue && (
                            <div className="absolute top-0 left-0 w-1 h-full bg-rose-500"></div>
                        )}
                        <div className="flex justify-between items-start mb-2">
                            <h4 className="font-bold text-slate-800 tracking-tight text-base">{op.opNumber}</h4>
                            <span className={`text-[10px] uppercase tracking-wider px-2 py-0.5 rounded-full font-bold ${
                                isOverdue ? 'bg-rose-100 text-rose-700' : 'bg-emerald-100 text-emerald-700'
                            }`}>
                                {sla.text}
                            </span>
                        </div>
                        <p className="text-sm font-medium text-slate-600 mb-2">{op.model}</p>
                        
                        <div className="flex items-center text-xs text-slate-500 mb-3 bg-slate-50 p-2 rounded-lg">
                            <i data-lucide="truck" className="w-3.5 h-3.5 mr-1.5 text-blue-500 flex-shrink-0"></i>
                            <span className="truncate font-medium">{op.faccaoDestino || 'Interno (Não Definido)'}</span>
                        </div>
                        
                        <div className="text-[11px] text-slate-500 space-y-1.5 border-t border-slate-100 pt-3">
                            <div className="flex items-center">
                                <i data-lucide="clock" className="w-3 h-3 mr-1.5 text-slate-400"></i>
                                Solicitação: <strong className="ml-1 text-slate-700">{formatDateTime(op.requestTime)}</strong>
                            </div>
                            <div className="flex items-center">
                                <i data-lucide="alert-circle" className="w-3 h-3 mr-1.5 text-slate-400"></i>
                                Prazo Limite: <strong className="ml-1 text-slate-700">{formatDateTime(op.slaDeadline)}</strong>
                            </div>
                        </div>

                        {op.notes && (
                            <div className="mt-3 p-2 bg-slate-50 rounded text-xs text-slate-600 border border-slate-100 italic truncate">
                                "{op.notes}"
                            </div>
                        )}

                        {op.items && op.items.length > 0 && (
                            <div className="mt-3 pt-2.5 border-t border-slate-100 flex justify-between items-center text-xs">
                                <span className="text-slate-500 font-medium flex items-center gap-1">
                                    <i data-lucide="package" className="w-3 h-3"></i> Checklist
                                </span>
                                <span className="bg-blue-50 text-blue-700 px-2 py-0.5 rounded font-semibold text-[10px]">
                                    {op.items.filter(i => i.checked).length} / {op.items.length} separados
                                </span>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    {/* Alertas e Toasts */}
                    {notification && (
                        <div className={`fixed top-4 right-4 z-50 p-4 rounded-xl shadow-lg border flex items-center gap-3 animate-bounce ${
                            notification.type === 'error' ? 'bg-rose-50 border-rose-200 text-rose-800' :
                            notification.type === 'success' ? 'bg-emerald-50 border-emerald-200 text-emerald-800' :
                            notification.type === 'warning' ? 'bg-amber-50 border-amber-200 text-amber-800' :
                            'bg-blue-50 border-blue-200 text-blue-800'
                        }`}>
                            <i data-lucide={notification.type === 'error' ? 'alert-circle' : 'info'} className="w-5 h-5"></i>
                            <span className="text-sm font-semibold">{notification.message}</span>
                        </div>
                    )}

                    {}
                    {/* Header Premium de Chão de Fábrica */}
                    <header className="glass-header sticky top-0 z-10 px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 p-2.5 rounded-xl shadow-md text-white">
                                <i data-lucide="package" className="w-6 h-6"></i>
                            </div>
                            <div>
                                <div className="flex items-center gap-2">
                                    <h1 className="text-xl font-bold text-slate-800 leading-tight">Almoxarifado Flow</h1>
                                    <span className={`text-[10px] px-2 py-0.5 rounded-full font-semibold flex items-center gap-1 ${
                                        dbState.online ? 'bg-emerald-100 text-emerald-700 border border-emerald-200' : 'bg-amber-100 text-amber-700 border border-amber-200'
                                    }`}>
                                        <i data-lucide={dbState.online ? 'wifi' : 'wifi-off'} className="w-3 h-3"></i>
                                        {dbState.online ? 'Nuvem Conectada' : 'Offline'}
                                    </span>
                                </div>
                                <p className="text-xs text-slate-500 font-medium">Gestão Formal de Aviamentos & Facções por OP</p>
                            </div>
                        </div>

                        <div className="flex flex-wrap gap-4 items-center w-full md:w-auto justify-end">
                            {/* Controle de Perfis */}
                            <div className="flex items-center bg-slate-100 p-1 rounded-xl border border-slate-200">
                                <button 
                                    onClick={() => {
                                        setUserRole('pcp');
                                        showToast("Perfil alterado para PCP (Geração de Solicitações)", "info");
                                    }}
                                    className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all flex items-center gap-1.5 ${
                                        userRole === 'pcp' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-500 hover:text-slate-800'
                                    }`}
                                >
                                    <i data-lucide="file-text" className="w-3.5 h-3.5"></i> PCP
                                </button>
                                <button 
                                    onClick={() => {
                                        setUserRole('almoxarifado');
                                        showToast("Perfil alterado para Almoxarifado (Separação)", "info");
                                    }}
                                    className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all flex items-center gap-1.5 ${
                                        userRole === 'almoxarifado' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-500 hover:text-slate-800'
                                    }`}
                                >
                                    <i data-lucide="package" className="w-3.5 h-3.5"></i> Almoxarifado
                                </button>
                            </div>

                            {/* Barra de Busca de OPs */}
                            <div className="relative w-full sm:w-64">
                                <i data-lucide="search" className="w-4 h-4 absolute left-3 top-3 text-slate-400"></i>
                                <input 
                                    type="text" 
                                    placeholder="Buscar OP, Modelo, Facção..." 
                                    className="pl-9 pr-4 py-2 border border-slate-200 bg-slate-50 rounded-lg text-sm focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none w-full transition-all"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                            
                            {/* Gatilho exclusivo para o PCP */}
                            {userRole === 'pcp' ? (
                                <button 
                                    onClick={() => handleOpenModal()}
                                    className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-colors flex items-center gap-2 shadow-md w-full sm:w-auto justify-center"
                                >
                                    <i data-lucide="plus" className="w-4 h-4"></i> Abrir Solicitação de OP
                                </button>
                            ) : (
                                <div className="text-xs text-amber-600 font-semibold bg-amber-50 border border-amber-100 p-2 rounded-lg hidden sm:flex items-center gap-1">
                                    <i data-lucide="info" className="w-4 h-4"></i> Perfil de Visualização & Separação
                                </div>
                            )}
                        </div>
                    </header>

                    {}
                    {/* Conteúdo Principal */}
                    <main className="flex-1 p-6 flex flex-col">
                        
                        {/* KPIs de Produção */}
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4 hover:border-slate-200 transition-all">
                                <div className="p-3.5 bg-blue-50 rounded-xl text-blue-600"><i data-lucide="file-text" className="w-6 h-6"></i></div>
                                <div>
                                    <p className="text-xs text-slate-500 font-semibold tracking-wide uppercase">Fila de Produção</p>
                                    <p className="text-2xl font-bold text-slate-800 mt-0.5">{totalSolicitacoes} OPs</p>
                                </div>
                            </div>
                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4 hover:border-slate-200 transition-all">
                                <div className="p-3.5 bg-sky-50 rounded-xl text-sky-600"><i data-lucide="clock" className="w-6 h-6"></i></div>
                                <div>
                                    <p className="text-xs text-slate-500 font-semibold tracking-wide uppercase">Pendentes Separação</p>
                                    <p className="text-2xl font-bold text-slate-800 mt-0.5">{pendentesAlmox} Ativos</p>
                                </div>
                            </div>
                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-rose-100 flex items-center gap-4 hover:border-rose-200 transition-all">
                                <div className="p-3.5 bg-rose-50 rounded-xl text-rose-600"><i data-lucide="alert-triangle" className="w-6 h-6"></i></div>
                                <div>
                                    <p className="text-xs text-slate-500 font-semibold tracking-wide uppercase">OPs Atrasadas (SLA)</p>
                                    <p className="text-2xl font-bold text-rose-600 mt-0.5">{atrasadasSla} Alertas</p>
                                </div>
                            </div>
                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-emerald-100 flex items-center gap-4 hover:border-emerald-200 transition-all">
                                <div className="p-3.5 bg-emerald-50 rounded-xl text-emerald-600"><i data-lucide="check-circle-2" className="w-6 h-6"></i></div>
                                <div>
                                    <p className="text-xs text-slate-500 font-semibold tracking-wide uppercase">Kits Liberados Hoje</p>
                                    <p className="text-2xl font-bold text-emerald-600 mt-0.5">{completadosHoje} Entregues</p>
                                </div>
                            </div>
                        </div>

                        {}
                        {/* Quadro Kanban de Processos */}
                        <div className="flex-1 overflow-x-auto pb-4">
                            <div className="flex gap-4 items-start min-w-[1200px] h-full">
                                
                                {statusOptions.map(status => {
                                    const colOps = filteredOps.filter(op => op.status === status.id);
                                    return (
                                        <div key={status.id} className="w-80 flex flex-col bg-slate-100/70 p-3 rounded-2xl border border-slate-200/60 max-h-[70vh]">
                                            <div className="p-2 mb-3 flex justify-between items-center">
                                                <h3 className="font-bold text-slate-700 text-sm flex items-center gap-2">
                                                    <span className={`w-3 h-3 rounded-full ${status.color.split(' ')[0]}`}></span>
                                                    {status.label}
                                                </h3>
                                                <span className="bg-slate-200 text-slate-600 text-xs py-0.5 px-2.5 rounded-full font-bold">{colOps.length}</span>
                                            </div>
                                            <div className="overflow-y-auto flex-1 custom-scrollbar space-y-3 kanban-col">
                                                {colOps.map(op => renderCard(op))}
                                                {colOps.length === 0 && (
                                                    <div className="text-center py-12 text-slate-400 text-xs border-2 border-dashed border-slate-300/80 rounded-xl flex flex-col items-center justify-center p-4">
                                                        <i data-lucide="package" className="w-8 h-8 mb-2 text-slate-300"></i>
                                                        Nenhuma OP nesta etapa
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )
                                })}

                            </div>
                        </div>
                    </main>

                    {}
                    {/* Modal de Gestão e Criação de Solicitações */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-3xl overflow-hidden flex flex-col max-h-[90vh] animate-in fade-in zoom-in-95 duration-200">
                                
                                {/* Cabeçalho do Modal */}
                                <div className="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50/50">
                                    <div className="flex items-center gap-2">
                                        <div className={`p-2 rounded-lg ${editingOp ? 'bg-amber-100 text-amber-700' : 'bg-blue-100 text-blue-700'}`}>
                                            <i data-lucide={editingOp ? 'edit-2' : 'plus'} className="w-5 h-5"></i>
                                        </div>
                                        <div>
                                            <h2 className="text-lg font-bold text-slate-800">
                                                {editingOp ? `Gerenciar OP: ${editingOp.opNumber}` : 'Nova Solicitação Formal de Aviamentos'}
                                            </h2>
                                            <p className="text-xs text-slate-500">Fluxo controlado por permissão e responsabilidade</p>
                                        </div>
                                    </div>
                                    <button onClick={handleCloseModal} className="p-1.5 hover:bg-slate-100 rounded-lg text-slate-400 hover:text-slate-600 transition-colors">
                                        <i data-lucide="x" className="w-5 h-5"></i>
                                    </button>
                                </div>
                                
                                <div className="p-6 overflow-y-auto flex-1 space-y-6">
                                    {/* Indicativo de Perfil Ativo dentro do Modal */}
                                    <div className={`p-3 rounded-xl border flex items-center justify-between text-xs font-semibold ${
                                        userRole === 'pcp' ? 'bg-blue-50 border-blue-100 text-blue-800' : 'bg-purple-50 border-purple-100 text-purple-800'
                                    }`}>
                                        <div className="flex items-center gap-2">
                                            <i data-lucide="user-check" className="w-4 h-4"></i>
                                            <span>Perfil Operando: {userRole.toUpperCase()}</span>
                                        </div>
                                        <span className="text-[10px] bg-white/60 px-2 py-0.5 rounded-full">
                                            {userRole === 'pcp' ? 'Apenas Edição de Dados' : 'Apenas Separação & Status'}
                                        </span>
                                    </div>

                                    <form id="opForm" onSubmit={handleSaveOp} className="space-y-4">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Número da OP *</label>
                                                <input 
                                                    type="text" required placeholder="Ex: OP-4600"
                                                    className="w-full p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all disabled:bg-slate-50 disabled:text-slate-500"
                                                    value={formData.opNumber} 
                                                    onChange={e => setFormData({...formData, opNumber: e.target.value})}
                                                    disabled={!!editingOp || userRole !== 'pcp'}
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Modelo / Referência *</label>
                                                <input 
                                                    type="text" required placeholder="Ex: Jaqueta Sarja 03"
                                                    className="w-full p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all disabled:bg-slate-50 disabled:text-slate-500"
                                                    value={formData.model} 
                                                    onChange={e => setFormData({...formData, model: e.target.value})}
                                                    disabled={!!editingOp || userRole !== 'pcp'}
                                                />
                                            </div>
                                        </div>

                                        <div>
                                            <label className="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Facção / Destino da Produção *</label>
                                            <input 
                                                type="text" required placeholder="Ex: Oficina Confecção Esperança"
                                                className="w-full p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all disabled:bg-slate-50 disabled:text-slate-500"
                                                value={formData.faccaoDestino} 
                                                onChange={e => setFormData({...formData, faccaoDestino: e.target.value})}
                                                disabled={userRole !== 'pcp'}
                                            />
                                        </div>

                                        {/* Checklist de Itens (Aviamentos) */}
                                        <div className="border border-slate-200 rounded-xl p-4 bg-slate-50/50">
                                            <h4 className="text-xs font-bold text-slate-700 uppercase tracking-wider mb-3 flex items-center justify-between">
                                                <span>Checklist de Aviamentos da Receita</span>
                                                <span className="text-[10px] text-slate-500 normal-case">Indique quais itens o almoxarifado precisa separar</span>
                                            </h4>

                                            {/* Inclusão de itens (Exclusivo PCP ao cadastrar/editar) */}
                                            {userRole === 'pcp' && (
                                                <div className="flex gap-2 mb-4 bg-white p-2 rounded-lg border border-slate-200 shadow-sm">
                                                    <input 
                                                        type="text" 
                                                        placeholder="Item (Ex: Zíper Preto)"
                                                        className="flex-1 p-2 border-0 focus:ring-0 text-sm outline-none"
                                                        value={newItemName}
                                                        onChange={e => setNewItemName(e.target.value)}
                                                    />
                                                    <input 
                                                        type="number" 
                                                        placeholder="Qtd"
                                                        className="w-20 p-2 border-l border-slate-200 focus:ring-0 text-sm outline-none"
                                                        value={newItemQtd}
                                                        onChange={e => setNewItemQtd(e.target.value)}
                                                    />
                                                    <button 
                                                        type="button"
                                                        onClick={addChecklistItem}
                                                        className="bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-md transition-colors"
                                                    >
                                                        <i data-lucide="plus" className="w-4 h-4"></i>
                                                    </button>
                                                </div>
                                            )}

                                            {/* Lista de itens com checkbox */}
                                            <div className="space-y-2 max-h-48 overflow-y-auto custom-scrollbar">
                                                {checklistItems.map((item) => (
                                                    <div 
                                                        key={item.id} 
                                                        className={`flex items-center justify-between p-2.5 rounded-lg border bg-white transition-all ${
                                                            item.checked ? 'border-emerald-200 bg-emerald-50/20' : 'border-slate-200'
                                                        }`}
                                                    >
                                                        <div className="flex items-center gap-3">
                                                            <input 
                                                                type="checkbox"
                                                                id={item.id}
                                                                checked={item.checked}
                                                                onChange={() => toggleChecklistItem(item.id)}
                                                                className="w-4.5 h-4.5 rounded border-slate-300 text-emerald-600 focus:ring-emerald-500 disabled:opacity-50"
                                                                disabled={userRole !== 'almoxarifado'}
                                                            />
                                                            <label 
                                                                htmlFor={item.id} 
                                                                className={`text-sm font-medium select-none ${
                                                                    item.checked ? 'line-through text-slate-400' : 'text-slate-700'
                                                                }`}
                                                            >
                                                                {item.name}
                                                            </label>
                                                        </div>
                                                        <div className="flex items-center gap-3">
                                                            <span className="text-xs font-semibold bg-slate-100 text-slate-600 px-2 py-0.5 rounded-md">
                                                                Qtd: {item.qtd}
                                                            </span>
                                                            {userRole === 'pcp' && (
                                                                <button 
                                                                    type="button"
                                                                    onClick={() => removeChecklistItem(item.id)}
                                                                    className="text-rose-500 hover:text-rose-700 p-1 rounded hover:bg-rose-50 transition-colors"
                                                                >
                                                                    <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                                </button>
                                                            )}
                                                        </div>
                                                    </div>
                                                ))}
                                                {checklistItems.length === 0 && (
                                                    <div className="text-center py-4 text-slate-400 text-xs">
                                                        Nenhum aviamento adicionado ao checklist desta OP.
                                                    </div>
                                                )}
                                            </div>
                                        </div>

                                        {editingOp && (
                                            <div className="p-4 bg-slate-100 border border-slate-200 rounded-xl space-y-4">
                                                <h4 className="text-xs font-bold text-slate-700 uppercase tracking-wider flex items-center gap-1.5">
                                                    <i data-lucide="package" className="w-4 h-4 text-blue-600"></i>
                                                    Atuação da Separação do Almoxarifado
                                                </h4>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1.5">Status de Separação</label>
                                                        <select 
                                                            className="w-full p-2.5 border border-slate-300 rounded-lg outline-none bg-white font-medium text-slate-700 focus:ring-2 focus:ring-blue-500 disabled:bg-slate-200 disabled:text-slate-500 disabled:cursor-not-allowed"
                                                            value={formData.status} 
                                                            onChange={e => setFormData({...formData, status: e.target.value})}
                                                            disabled={userRole !== 'almoxarifado'}
                                                        >
                                                            {statusOptions.map(opt => (
                                                                <option key={opt.id} value={opt.id}>{opt.label}</option>
                                                            ))}
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1.5">Anotações e Justificativas de Atraso</label>
                                                        <textarea 
                                                            rows="2" placeholder="Ex: Linha de pesponto em falta no estoque físico. Requisitado compras."
                                                            className="w-full p-2.5 border border-slate-300 rounded-lg outline-none bg-white text-slate-700 text-sm focus:ring-2 focus:ring-blue-500 disabled:bg-slate-200 disabled:text-slate-500 disabled:cursor-not-allowed"
                                                            value={formData.notes} 
                                                            onChange={e => setFormData({...formData, notes: e.target.value})}
                                                            disabled={userRole !== 'almoxarifado'}
                                                        ></textarea>
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        {!editingOp && (
                                            <div className="bg-amber-50 p-3.5 rounded-xl border border-amber-200 text-xs text-amber-800 flex items-start gap-2.5">
                                                <i data-lucide="info" className="w-5 h-5 flex-shrink-0 mt-0.5 text-amber-600"></i>
                                                <div>
                                                    <p className="font-bold">Diretriz Lean de Fluxo Contínuo:</p>
                                                    <p className="mt-0.5">Ao salvar, este pedido formal será enviado ao Almoxarifado com cronômetro regressivo de <strong>{SLA_HOURS_DEFAULT} horas</strong>. A produção de corte ou expedição da facção só deve prosseguir com o status "Kit Completo Separado".</p>
                                                </div>
                                            </div>
                                        )}
                                    </form>
                                </div>
                                
                                {/* Rodapé do Modal */}
                                <div className="px-6 py-4 border-t border-slate-200 bg-slate-50 flex justify-between items-center rounded-b-2xl">
                                    <div className="text-[11px] text-slate-500">
                                        {editingOp && `Solicitado em: ${formatDateTime(editingOp.requestTime)}`}
                                    </div>
                                    <div className="flex gap-3">
                                        <button 
                                            type="button" 
                                            onClick={handleCloseModal} 
                                            className="px-4 py-2 border border-slate-200 hover:bg-slate-100 rounded-lg text-slate-700 bg-white text-sm font-semibold transition-colors"
                                        >
                                            Cancelar
                                        </button>
                                        
                                        {/* Permissões baseadas em responsabilidade industrial */}
                                        {((userRole === 'pcp' && !editingOp) || (userRole === 'almoxarifado' && editingOp) || (userRole === 'pcp' && editingOp)) && (
                                            <button 
                                                type="submit" 
                                                form="opForm" 
                                                className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-semibold shadow-md flex items-center gap-2 transition-colors"
                                            >
                                                <i data-lucide="save" className="w-4 h-4"></i> Salvar Alterações
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Painel do Analista de Processos no Rodapé */}
                    <footer className="bg-slate-900 text-slate-400 py-4 px-6 border-t border-slate-800 text-xs mt-auto">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-2.5">
                                <div className="bg-slate-800 p-1.5 rounded text-blue-400">
                                    <i data-lucide="database" className="w-4 h-4"></i>
                                </div>
                                <div>
                                    <p className="font-bold text-slate-300">Garantia de Qualidade & Processos</p>
                                    <p className="text-[10px] text-slate-500">SLA: {SLA_HOURS_DEFAULT}h úteis | Auditoria de Envio de Lotes para Oficinas Externas</p>
                                </div>
                            </div>
                            
                            <div className="flex flex-wrap gap-4 items-center bg-slate-950 p-2 rounded-lg border border-slate-800">
                                <span className="text-[10px] text-slate-500 uppercase tracking-wider font-bold">Diagnóstico de Sincronia:</span>
                                <div className="flex items-center gap-1 text-[11px]">
                                    <span className={`w-2.5 h-2.5 rounded-full ${dbState.online ? 'bg-emerald-500' : 'bg-amber-500'}`}></span>
                                    <span className="text-slate-300 font-semibold">{dbState.type}</span>
                                </div>
                                <button 
                                    onClick={() => {
                                        const fb = window.FirebaseBridge;
                                        if (fb && fb.isOnline) {
                                            showToast("Sincronia com o banco de dados em tempo real testada e ativa!", "success");
                                        } else {
                                            showToast("Modo local (Offline) atualizado no seu navegador local.", "info");
                                        }
                                    }}
                                    className="p-1 hover:bg-slate-800 rounded transition-colors text-slate-400 hover:text-white"
                                    title="Forçar Sincronia"
                                >
                                    <i data-lucide="refresh-cw" className="w-3.5 h-3.5"></i>
                                </button>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
