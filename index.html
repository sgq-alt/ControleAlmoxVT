<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Aviamentos por OP</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel para tradução inline do JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons para interface profissional -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Font Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- SDKs do Firebase (Versão Compat para facilidade em arquivos únicos) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
        }
        .kanban-col { 
            min-height: calc(100vh - 280px); 
        }
        .glass-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        /* Custom scrollbar para deixar a interface limpa */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { 
            Settings, Package, Clock, AlertTriangle, CheckCircle, Search, 
            Plus, Edit2, AlertCircle, RefreshCw, LogIn, Lock, Info, 
            CheckSquare, Square, Trash2, Eye, UserCheck, Wifi, WifiOff,
            FileText, UploadCloud, X, ExternalLink
        } = window.lucide;

        // Configurações do Firebase integradas conforme enviado
        const firebaseConfig = {
            apiKey: "AIzaSyDE5W2dSh9bdsds_E8_5Cvrr0KE2IOlzpI",
            authDomain: "almoxvt.firebaseapp.com",
            projectId: "almoxvt",
            storageBucket: "almoxvt.firebasestorage.app",
            messagingSenderId: "688995393151",
            appId: "1:688995393151:web:55ef061e6641f376b7294a",
            measurementId: "G-CJRY2BQWRH"
        };

        // Inicializando o app Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        // Configuração de SLA padrão do processo (24 horas úteis)
        const initialSLAHours = 24; 

        // Lista suspensa padronizada para os status da OP
        const statusOptions = [
            { id: 'pendente', label: 'Pendente', color: 'bg-slate-100 text-slate-800 border-slate-300' },
            { id: 'em_separacao', label: 'Em Separação', color: 'bg-blue-100 text-blue-800 border-blue-300' },
            { id: 'aguardando_compra', label: 'Aguardando Compra', color: 'bg-amber-100 text-amber-800 border-amber-300' },
            { id: 'em_producao', label: 'Em Produção', color: 'bg-purple-100 text-purple-800 border-purple-300' },
            { id: 'parcial', label: 'Parcial (Faltam Itens)', color: 'bg-orange-100 text-orange-800 border-orange-300' },
            { id: 'completo', label: 'Kit Completo Separado', color: 'bg-emerald-100 text-emerald-800 border-emerald-300' }
        ];

        // Dados de amostragem inicial caso o banco de dados esteja vazio
        const initialOpmData = [
            {
                id: 'exemplo-001',
                opNumber: 'OP-4599',
                model: 'Camiseta Basic 01 (Lote Exemplo)',
                faccaoDestino: 'Oficina Costura Rápida',
                requestTime: new Date(new Date().getTime() - (2 * 60 * 60 * 1000)).toISOString(),
                slaDeadline: new Date(new Date().getTime() + (22 * 60 * 60 * 1000)).toISOString(),
                status: 'pendente',
                notes: '',
                completedTime: null,
                items: [
                    { name: 'Botão de Pressão Prata 15mm', qtd: 150, checked: false },
                    { name: 'Etiqueta Interna Composição', qtd: 150, checked: false },
                    { name: 'Tag Papel Kraft', qtd: 150, checked: false }
                ]
            }
        ];

        // Formatação de data/hora no padrão fabril brasileiro
        const formatDateTime = (dateString) => {
            if (!dateString) return '--';
            const date = new Date(dateString);
            return date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
        };

        const calculateSlaStatus = (deadline, completedTime) => {
            const now = new Date();
            const limit = new Date(deadline);
            
            if (completedTime) {
                const comp = new Date(completedTime);
                return comp <= limit ? { status: 'ok', text: 'No Prazo' } : { status: 'late', text: 'Entregue c/ Atraso' };
            }
            
            if (now > limit) {
                return { status: 'late', text: 'Atrasado' };
            }
            return { status: 'ok', text: 'No Prazo' };
        };

        const App = () => {
            const [ops, setOps] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingOp, setEditingOp] = useState(null);
            const [userRole, setUserRole] = useState('pcp'); // Controle de Governança: 'pcp' ou 'almoxarifado'
            const [dbStatus, setDbStatus] = useState('conectando'); // 'conectando', 'online', 'error'
            const [authError, setAuthError] = useState(null);
            const [isAuthenticated, setIsAuthenticated] = useState(false); // Trava contra condição de corrida de permissões

            // Estados adicionais para checklist dinâmico no modal de criação
            const [newChecklistName, setNewChecklistName] = useState('');
            const [newChecklistQtd, setNewChecklistQtd] = useState('');
            const [tempChecklist, setTempChecklist] = useState([]);
            
            // Estado para gerenciar arquivos PDF e erros de upload de forma amigável (Sem usar alerts)
            const [pdfError, setPdfError] = useState(null);

            // Estado para o formulário de Nova/Edição OP (Atualizado com SlaDeadline e Anexo de PDF)
            const [formData, setFormData] = useState({
                opNumber: '', model: '', faccaoDestino: '', status: 'pendente', notes: '', items: [], slaDeadline: '', pdfFile: null
            });

            useEffect(() => {
                // Monitora o estado de autenticação de forma síncrona com o ciclo de vida do componente
                const unsubscribeAuth = auth.onAuthStateChanged((user) => {
                    if (user) {
                        console.log("Autenticado anonimamente com sucesso!");
                        setIsAuthenticated(true);
                        setAuthError(null);
                    } else {
                        setIsAuthenticated(false);
                        auth.signInAnonymously()
                            .catch((error) => {
                                console.error("Erro ao autenticar no modo produção:", error);
                                setAuthError(error.message);
                                setDbStatus('error');
                            });
                    }
                });
                return () => unsubscribeAuth();
            }, []);

            useEffect(() => {
                // SALVAGUARDA: Só inicia a escuta das coleções após o usuário estar formalmente autenticado
                if (!isAuthenticated) return;

                setDbStatus('conectando');
                const unsubscribe = db.collection("solicitacoes")
                    .orderBy("requestTime", "desc")
                    .onSnapshot((snapshot) => {
                        const items = [];
                        snapshot.forEach((doc) => {
                            items.push({ id: doc.id, ...doc.data() });
                        });

                        // Se o banco estiver zerado no primeiro acesso, adiciona o exemplo
                        if (items.length === 0) {
                            initialOpmData.forEach(async (op) => {
                                await db.collection("solicitacoes").doc(op.id).set(op);
                            });
                        } else {
                            setOps(items);
                        }
                        setDbStatus('online');
                    }, (error) => {
                        console.error("Erro no canal Firestore:", error);
                        setDbStatus('error');
                    });

                return () => unsubscribe();
            }, [isAuthenticated]);

            // Atualiza os ícones do Lucide sempre que a árvore renderizar
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            const handleOpenModal = (op = null) => {
                setPdfError(null);
                if (op) {
                    setEditingOp(op);
                    
                    // Converte o SLA da OP para o formato datetime-local aceitável pelo HTML (YYYY-MM-DDTHH:mm)
                    const opDate = op.slaDeadline ? new Date(op.slaDeadline) : new Date();
                    const localISOString = new Date(opDate.getTime() - opDate.getTimezoneOffset() * 60000).toISOString().slice(0, 16);

                    setFormData({
                        opNumber: op.opNumber,
                        model: op.model,
                        faccaoDestino: op.faccaoDestino,
                        status: op.status,
                        notes: op.notes || '',
                        items: op.items || [],
                        slaDeadline: localISOString,
                        pdfFile: op.pdfFile || null
                    });
                } else {
                    setEditingOp(null);
                    setTempChecklist([]);
                    
                    // Pré-calcula a sugestão padrão de 24 horas a partir de agora ajustada com o fuso local
                    const defaultDeadline = new Date(new Date().getTime() + (initialSLAHours * 60 * 60 * 1000));
                    const localISOString = new Date(defaultDeadline.getTime() - defaultDeadline.getTimezoneOffset() * 60000).toISOString().slice(0, 16);

                    setFormData({ 
                        opNumber: '', 
                        model: '', 
                        faccaoDestino: '', 
                        status: 'pendente', 
                        notes: '', 
                        items: [],
                        slaDeadline: localISOString,
                        pdfFile: null
                    });
                }
                setIsModalOpen(true);
            };

            const handleCloseModal = () => {
                setIsModalOpen(false);
                setEditingOp(null);
                setTempChecklist([]);
                setPdfError(null);
            };

            // Processamento do Arquivo PDF da OP de forma reativa e segura
            const handlePdfUpload = (e) => {
                const file = e.target.files[0];
                setPdfError(null);
                if (!file) return;

                if (file.type !== 'application/pdf') {
                    setPdfError('Por favor, selecione apenas arquivos no formato PDF.');
                    return;
                }

                // Limite técnico de 800KB para evitar estouro da cota gratuita do documento Firestore (1MB)
                if (file.size > 800 * 1024) {
                    setPdfError('Este PDF é muito pesado (limite de 800KB para nuvem). Otimize o PDF ou anexe uma versão de página única.');
                    return;
                }

                const reader = new FileReader();
                reader.onload = (uploadEvent) => {
                    setFormData({
                        ...formData,
                        pdfFile: {
                            name: file.name,
                            size: (file.size / 1024).toFixed(1) + ' KB',
                            data: uploadEvent.target.result
                        }
                    });
                };
                reader.onerror = () => {
                    setPdfError('Erro ao ler o arquivo PDF. Tente novamente.');
                };
                reader.readAsDataURL(file);
            };

            const handleRemovePdf = () => {
                setFormData({ ...formData, pdfFile: null });
                setPdfError(null);
            };

            const handleViewPdf = () => {
                if (!formData.pdfFile || !formData.pdfFile.data) return;
                try {
                    const pdfWindow = window.open();
                    pdfWindow.document.write(
                        `<iframe src="${formData.pdfFile.data}" style="border:0; position:fixed; top:0; left:0; bottom:0; right:0; width:100%; height:100%;" allowfullscreen></iframe>`
                    );
                    pdfWindow.document.title = `Visualizador de OP - ${formData.opNumber || 'PDF'}`;
                } catch (err) {
                    setPdfError('Bloqueador de pop-ups ativado. Por favor, permita aberturas de nova guia para visualizar o PDF.');
                }
            };

            const addChecklistItem = () => {
                if (!newChecklistName || !newChecklistQtd) return;
                const newItem = {
                    name: newChecklistName,
                    qtd: parseInt(newChecklistQtd, 10) || 0,
                    checked: false
                };
                if (editingOp) {
                    // Atualiza em tempo real se estiver editando uma existente
                    const updatedItems = [...formData.items, newItem];
                    setFormData({ ...formData, items: updatedItems });
                } else {
                    // Guarda na fila temporária se for nova OP
                    setTempChecklist([...tempChecklist, newItem]);
                }
                setNewChecklistName('');
                setNewChecklistQtd('');
            };

            const removeChecklistItem = (index) => {
                if (editingOp) {
                    const updatedItems = formData.items.filter((_, i) => i !== index);
                    setFormData({ ...formData, items: updatedItems });
                } else {
                    setTempChecklist(tempChecklist.filter((_, i) => i !== index));
                }
            };

            const toggleItemChecked = async (index) => {
                if (userRole !== 'almoxarifado') return; // Bloqueio de Governança
                const updatedItems = formData.items.map((item, i) => 
                    i === index ? { ...item, checked: !item.checked } : item
                );
                setFormData({ ...formData, items: updatedItems });
            };

            const handleSaveOp = async (e) => {
                e.preventDefault();
                const now = new Date();
                
                if (editingOp) {
                    // Regra: Apenas o Almoxarifado altera o status físico das OPs
                    if (userRole !== 'almoxarifado') return;

                    let compTime = editingOp.completedTime;
                    if (formData.status === 'completo' && editingOp.status !== 'completo') {
                        compTime = now.toISOString();
                    } else if (formData.status !== 'completo') {
                        compTime = null;
                    }

                    const updatedData = {
                        status: formData.status,
                        notes: formData.notes,
                        items: formData.items,
                        completedTime: compTime
                    };

                    try {
                        await db.collection("solicitacoes").doc(editingOp.id).update(updatedData);
                    } catch (error) {
                        setPdfError("Erro ao salvar alterações no banco: " + error.message);
                    }
                } else {
                    // Regra: Apenas o PCP pode abrir novas solicitações de OP
                    if (userRole !== 'pcp') return;

                    // Converte a data selecionada no formulário de volta para o formato de String ISO global antes de enviar ao Firestore
                    const selectedDeadlineISO = formData.slaDeadline ? new Date(formData.slaDeadline).toISOString() : new Date(now.getTime() + (initialSLAHours * 60 * 60 * 1000)).toISOString();

                    const newOp = {
                        opNumber: formData.opNumber,
                        model: formData.model,
                        faccaoDestino: formData.faccaoDestino,
                        status: 'pendente',
                        notes: '',
                        requestTime: now.toISOString(),
                        slaDeadline: selectedDeadlineISO,
                        completedTime: null,
                        items: tempChecklist,
                        pdfFile: formData.pdfFile || null
                    };

                    try {
                        await db.collection("solicitacoes").add(newOp);
                    } catch (error) {
                        setPdfError("Erro ao criar OP no banco: " + error.message);
                    }
                }
                handleCloseModal();
            };

            const isCompletedAndOld = (op) => {
                if (op.status !== 'completo' || !op.completedTime) return false;
                const completedAt = new Date(op.completedTime).getTime();
                const now = new Date().getTime();
                const hoursPassed = (now - completedAt) / (1000 * 60 * 60);
                return hoursPassed >= 24; 
            };

            const visibleOps = ops.filter(op => !isCompletedAndOld(op));

            // Filtro dinâmico da busca textual
            const filteredOps = visibleOps.filter(op => 
                op.opNumber.toLowerCase().includes(searchTerm.toLowerCase()) ||
                op.model.toLowerCase().includes(searchTerm.toLowerCase()) ||
                op.faccaoDestino.toLowerCase().includes(searchTerm.toLowerCase())
            );

            // Geração de Indicadores Industriais (KPIs) baseados no painel ativo
            const totalOps = visibleOps.length;
            const completedOps = visibleOps.filter(op => op.status === 'completo').length;
            const pendingOps = totalOps - completedOps;
            const lateOps = visibleOps.filter(op => calculateSlaStatus(op.slaDeadline, op.completedTime).status === 'late' && op.status !== 'completo').length;

            const renderCard = (op) => {
                const sla = calculateSlaStatus(op.slaDeadline, op.completedTime);
                const statusInfo = statusOptions.find(s => s.id === op.status);

                return (
                    <div 
                        key={op.id} 
                        className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-3 hover:shadow-md transition-shadow cursor-pointer relative overflow-hidden" 
                        onClick={() => handleOpenModal(op)}
                    >
                        {/* Linha colorida do lado indicando o farol de SLA */}
                        <div className={`absolute left-0 top-0 bottom-0 w-1 ${sla.status === 'late' ? 'bg-rose-500' : 'bg-emerald-500'}`} />
                        
                        <div className="flex justify-between items-start mb-2 pl-1">
                            <h4 className="font-bold text-slate-800 flex items-center gap-1">
                                {op.opNumber}
                                {op.pdfFile && (
                                    <span title="Ficha Técnica / PDF Anexo">
                                        <i data-lucide="file-text" className="w-3.5 h-3.5 text-blue-500"></i>
                                    </span>
                                )}
                            </h4>
                            <span className={`text-[10px] px-2 py-0.5 rounded-full font-medium flex items-center gap-1 ${sla.status === 'late' ? 'bg-rose-100 text-rose-700' : 'bg-emerald-100 text-emerald-700'}`}>
                                <span className={`w-1.5 h-1.5 rounded-full ${sla.status === 'late' ? 'bg-rose-500 animate-pulse' : 'bg-emerald-500'}`} />
                                {sla.text}
                            </span>
                        </div>
                        
                        <p className="text-sm text-slate-600 mb-1 font-medium pl-1">{op.model}</p>
                        <p className="text-xs text-slate-500 mb-3 flex items-center pl-1">
                            <i data-lucide="truck" className="w-3.5 h-3.5 mr-1 text-slate-400"></i> {op.faccaoDestino || 'Interno'}
                        </p>
                        
                        <div className="text-[11px] text-slate-500 mb-2 space-y-1 bg-slate-50 p-2 rounded-lg border border-slate-100">
                            <div className="flex items-center gap-1.5">
                                <i data-lucide="clock" className="w-3 h-3 text-slate-400"></i>
                                <span>Solicitação: {formatDateTime(op.requestTime)}</span>
                            </div>
                            <div className="flex items-center gap-1.5">
                                <i data-lucide="alert-circle" className="w-3 h-3 text-slate-400"></i>
                                <span className={sla.status === 'late' ? 'text-rose-600 font-semibold' : ''}>Prazo: {formatDateTime(op.slaDeadline)}</span>
                            </div>
                        </div>

                        {op.notes && (
                            <div className="mt-2 p-2 bg-amber-50/50 rounded-lg text-[11px] text-amber-900 border border-amber-100">
                                <strong>Obs:</strong> {op.notes.length > 55 ? op.notes.substring(0,55) + '...' : op.notes}
                            </div>
                        )}
                        
                        <div className="mt-2 flex justify-between items-center bg-slate-100/50 px-2 py-1 rounded text-[11px] text-slate-500">
                            {op.pdfFile ? (
                                <span className="flex items-center gap-1 text-blue-600 font-medium">
                                    <i data-lucide="file-text" className="w-3 h-3"></i> PDF da OP Anexo
                                </span>
                            ) : (
                                <span className="text-slate-400">Sem PDF</span>
                            )}
                            {op.items && op.items.length > 0 ? (
                                <span className="font-bold text-slate-700">
                                    {op.items.filter(i => i.checked).length}/{op.items.length} checklist
                                </span>
                            ) : (
                                <span className="text-slate-400">Sem checklist</span>
                            )}
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header Premium com Perfis de Governança */}
                    <header className="glass-header sticky top-0 z-40 px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 p-2.5 rounded-xl text-white shadow-sm">
                                <i data-lucide="package" className="w-6 h-6"></i>
                            </div>
                            <div>
                                <h1 className="text-xl font-bold text-slate-800 leading-tight">Almoxarifado Flow</h1>
                                <p className="text-xs text-slate-500">Gestão e Canal de Aviamentos por OP</p>
                            </div>
                        </div>

                        <div className="flex flex-wrap gap-3 items-center w-full md:w-auto justify-end">
                            {/* Controle de Segurança / Governança */}
                            <div className="flex items-center bg-slate-100 p-1 rounded-xl border border-slate-200">
                                <button 
                                    onClick={() => { setUserRole('pcp'); handleCloseModal(); }}
                                    className={`px-4 py-1.5 rounded-lg text-xs font-semibold transition-all flex items-center gap-1.5 ${userRole === 'pcp' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-500 hover:text-slate-800'}`}
                                >
                                    <i data-lucide="edit-2" className="w-3.5 h-3.5"></i>
                                    Painel PCP
                                </button>
                                <button 
                                    onClick={() => { setUserRole('almoxarifado'); handleCloseModal(); }}
                                    className={`px-4 py-1.5 rounded-lg text-xs font-semibold transition-all flex items-center gap-1.5 ${userRole === 'almoxarifado' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-500 hover:text-slate-800'}`}
                                >
                                    <i data-lucide="check-square" className="w-3.5 h-3.5"></i>
                                    Almoxarifado
                                </button>
                            </div>

                            {/* Barra de Pesquisa */}
                            <div className="relative">
                                <i data-lucide="search" className="w-4 h-4 absolute left-3 top-3 text-slate-400"></i>
                                <input 
                                    type="text" 
                                    placeholder="Buscar OP, Modelo..." 
                                    className="pl-9 pr-4 py-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none w-48 md:w-56 bg-slate-50/50"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                            
                            {/* Gatilho exclusivo do PCP */}
                            {userRole === 'pcp' && (
                                <button 
                                    onClick={() => handleOpenModal()}
                                    className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl text-sm font-semibold transition-all flex items-center gap-2 shadow-sm shadow-blue-100">
                                    <i data-lucide="plus" className="w-4 h-4"></i> Nova OP
                                </button>
                            )}
                        </div>
                    </header>

                    {/* Conteúdo Principal do Painel */}
                    <main className="flex-1 p-6 flex flex-col gap-6">
                        
                        {/* Blocos de Indicadores Industriais (KPIs) */}
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                                <div className="p-3 bg-blue-50 rounded-xl text-blue-600"><i data-lucide="file-text" className="w-5 h-5"></i></div>
                                <div><p className="text-xs text-slate-500 font-medium">Total de Fila</p><p className="text-xl font-bold text-slate-800">{totalOps}</p></div>
                            </div>
                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                                <div className="p-3 bg-amber-50 rounded-xl text-amber-600"><i data-lucide="clock" className="w-5 h-5"></i></div>
                                <div><p className="text-xs text-slate-500 font-medium">Em Separação</p><p className="text-xl font-bold text-slate-800">{pendingOps}</p></div>
                            </div>
                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                                <div className="p-3 bg-rose-50 rounded-xl text-rose-600"><i data-lucide="alert-triangle" className="w-5 h-5 animate-bounce"></i></div>
                                <div><p className="text-xs text-slate-500 font-medium">Atrasos (SLA)</p><p className="text-xl font-bold text-rose-700">{lateOps}</p></div>
                            </div>
                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                                <div className="p-3 bg-emerald-50 rounded-xl text-emerald-600"><i data-lucide="check-circle" className="w-5 h-5"></i></div>
                                <div><p className="text-xs text-slate-500 font-medium">Entregues (24h)</p><p className="text-xl font-bold text-slate-800">{completedOps}</p></div>
                            </div>
                        </div>

                        <div className="flex-1 overflow-x-auto overflow-y-hidden pb-4">
                            <div className="flex gap-4 h-full items-start min-w-max">
                                
                                {statusOptions.map(status => {
                                    const colOps = filteredOps.filter(op => op.status === status.id);
                                    return (
                                        <div key={status.id} className="w-72 flex flex-col max-h-[75vh] bg-slate-50 rounded-2xl border border-slate-200 flex-shrink-0">
                                            <div className="p-3 border-b border-slate-200 flex justify-between items-center bg-slate-100/50 rounded-t-2xl">
                                                <h3 className="font-semibold text-slate-700 text-xs flex items-center gap-2">
                                                    <span className={`w-2.5 h-2.5 rounded-full ${status.color.split(' ')[0]}`}></span>
                                                    {status.label}
                                                </h3>
                                                <span className="bg-slate-200 text-slate-600 text-[10px] py-0.5 px-2 rounded-full font-bold">{colOps.length}</span>
                                            </div>
                                            <div className="p-3 overflow-y-auto flex-1 custom-scrollbar kanban-col">
                                                {colOps.map(op => renderCard(op))}
                                                {colOps.length === 0 && (
                                                    <div className="text-center py-10 text-slate-400 text-xs border-2 border-dashed border-slate-200 rounded-xl bg-white/50">
                                                        Vazio
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )
                                })}

                            </div>
                        </div>
                    </main>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-950/40 backdrop-filter backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                                    <h2 className="text-md font-bold text-slate-800 flex items-center gap-2">
                                        <i data-lucide={editingOp ? "eye" : "plus"} className="w-5 h-5 text-blue-600"></i>
                                        {editingOp ? `Gerenciar OP: ${editingOp.opNumber}` : 'Nova Solicitação de Aviamentos'}
                                    </h2>
                                    <button onClick={handleCloseModal} className="text-slate-400 hover:text-slate-600 transition-colors">
                                        <i data-lucide="x" className="w-5 h-5"></i>
                                    </button>
                                </div>
                                
                                <div className="p-6 overflow-y-auto flex-1 custom-scrollbar space-y-5">
                                    <form id="opForm" onSubmit={handleSaveOp} className="space-y-4">
                                        {/* Informações Básicas (Sempre editáveis apenas na criação pelo PCP) */}
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-semibold text-slate-600 mb-1">Número da OP *</label>
                                                <input 
                                                    type="text" required
                                                    className="w-full p-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none disabled:bg-slate-50 disabled:text-slate-500"
                                                    value={formData.opNumber} 
                                                    onChange={e => setFormData({...formData, opNumber: e.target.value})}
                                                    disabled={!!editingOp || userRole !== 'pcp'}
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-semibold text-slate-600 mb-1">Modelo / Referência *</label>
                                                <input 
                                                    type="text" required
                                                    className="w-full p-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none disabled:bg-slate-50 disabled:text-slate-500"
                                                    value={formData.model} 
                                                    onChange={e => setFormData({...formData, model: e.target.value})}
                                                    disabled={!!editingOp || userRole !== 'pcp'}
                                                />
                                            </div>
                                        </div>

                                        {/* Destino e SLA customizável lado a lado para PCP */}
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-semibold text-slate-600 mb-1">Destino (Facção / Oficina Terceira) *</label>
                                                <input 
                                                    type="text" required placeholder="Ex: Oficina Confecção Silva"
                                                    className="w-full p-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none disabled:bg-slate-50 disabled:text-slate-500"
                                                    value={formData.faccaoDestino} 
                                                    onChange={e => setFormData({...formData, faccaoDestino: e.target.value})}
                                                    disabled={!!editingOp || userRole !== 'pcp'}
                                                />
                                            </div>
                                            
                                            <div>
                                                <label className="block text-xs font-semibold text-slate-600 mb-1">Prazo de Entrega (SLA) *</label>
                                                <input 
                                                    type="datetime-local" required
                                                    className="w-full p-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none disabled:bg-slate-50 disabled:text-slate-500 font-medium"
                                                    value={formData.slaDeadline} 
                                                    onChange={e => setFormData({...formData, slaDeadline: e.target.value})}
                                                    disabled={!!editingOp || userRole !== 'pcp'}
                                                />
                                            </div>
                                        </div>

                                        {/* GESTÃO DE ANEXO DE PDF - EXCLUSIVO PCP NA CRIAÇÃO OU VISUALIZAÇÃO GERAL */}
                                        <div className="border border-slate-100 rounded-2xl p-4 bg-slate-50/50">
                                            <h3 className="text-xs font-bold text-slate-700 mb-2 flex items-center justify-between">
                                                <span>Ficha Técnica / PDF da OP</span>
                                                <span className="text-[10px] text-slate-400">Opcional (Máx: 800KB)</span>
                                            </h3>

                                            {/* Erro de Arquivo (Amigável, sem alert) */}
                                            {pdfError && (
                                                <div className="mb-3 p-2.5 bg-rose-50 border border-rose-100 rounded-xl text-xs text-rose-700 flex items-center gap-1.5">
                                                    <i data-lucide="alert-circle" className="w-4 h-4 flex-shrink-0"></i>
                                                    <span>{pdfError}</span>
                                                </div>
                                            )}

                                            {/* Renderização condicional: Upload (Para PCP) ou Visualização (Para Almoxarifado / PCP) */}
                                            {!formData.pdfFile ? (
                                                userRole === 'pcp' ? (
                                                    <div className="border-2 border-dashed border-slate-200 rounded-xl p-4 text-center hover:border-blue-400 transition-colors bg-white cursor-pointer relative">
                                                        <input 
                                                            type="file" 
                                                            accept=".pdf"
                                                            onChange={handlePdfUpload}
                                                            className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                                                        />
                                                        <div className="flex flex-col items-center justify-center gap-1.5">
                                                            <div className="p-2 bg-blue-50 rounded-full text-blue-500">
                                                                <i data-lucide="upload-cloud" className="w-5 h-5"></i>
                                                            </div>
                                                            <span className="text-xs font-semibold text-slate-700">Clique para anexar o PDF da OP</span>
                                                            <span className="text-[10px] text-slate-400">Formatos aceitos: apenas arquivos .pdf</span>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <div className="p-3 text-center text-xs text-slate-400 border border-dashed border-slate-200 bg-white rounded-xl">
                                                        Nenhum documento PDF foi anexado a esta solicitação.
                                                    </div>
                                                )
                                            ) : (
                                                <div className="flex items-center justify-between p-3 bg-white border border-slate-200 rounded-xl">
                                                    <div className="flex items-center gap-2.5 min-w-0">
                                                        <div className="p-2 bg-rose-50 text-rose-600 rounded-lg">
                                                            <i data-lucide="file-text" className="w-5 h-5"></i>
                                                        </div>
                                                        <div className="min-w-0">
                                                            <p className="text-xs font-semibold text-slate-800 truncate" title={formData.pdfFile.name}>
                                                                {formData.pdfFile.name}
                                                            </p>
                                                            <p className="text-[10px] text-slate-400">{formData.pdfFile.size}</p>
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="flex items-center gap-2">
                                                        <button 
                                                            type="button" 
                                                            onClick={handleViewPdf}
                                                            className="px-3 py-1.5 bg-blue-50 hover:bg-blue-100 text-blue-700 rounded-lg text-xs font-semibold transition-colors flex items-center gap-1"
                                                        >
                                                            <i data-lucide="external-link" className="w-3.5 h-3.5"></i>
                                                            Visualizar
                                                        </button>
                                                        {userRole === 'pcp' && !editingOp && (
                                                            <button 
                                                                type="button" 
                                                                onClick={handleRemovePdf}
                                                                className="p-1.5 hover:bg-slate-100 text-slate-400 hover:text-rose-600 rounded-lg transition-colors"
                                                            >
                                                                <i data-lucide="x" className="w-4 h-4"></i>
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        <div className="border border-slate-100 rounded-2xl p-4 bg-slate-50/50">
                                            <h3 className="text-xs font-bold text-slate-700 mb-3 flex items-center justify-between">
                                                <span>Checklist Opcional de Aviamentos Requisitados</span>
                                                {userRole === 'pcp' && <span className="text-[10px] text-blue-600 font-medium">Apenas PCP cadastra</span>}
                                                {userRole === 'almoxarifado' && <span className="text-[10px] text-emerald-600 font-medium">Almoxarifado: Clique para dar baixa</span>}
                                            </h3>

                                            {/* Formulário de novos itens (Apenas Visível/Habilitado para PCP na criação ou edição) */}
                                            {userRole === 'pcp' && (
                                                <div className="flex gap-2 mb-3">
                                                    <input 
                                                        type="text" placeholder="Nome do aviamento..." 
                                                        className="flex-1 p-2 border border-slate-200 rounded-xl text-xs bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                                                        value={newChecklistName}
                                                        onChange={e => setNewChecklistName(e.target.value)}
                                                    />
                                                    <input 
                                                        type="number" placeholder="Qtd" 
                                                        className="w-20 p-2 border border-slate-200 rounded-xl text-xs bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                                                        value={newChecklistQtd}
                                                        onChange={e => setNewChecklistQtd(e.target.value)}
                                                    />
                                                    <button 
                                                        type="button" onClick={addChecklistItem}
                                                        className="bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-xl text-xs font-semibold flex items-center gap-1"
                                                    >
                                                        Adicionar
                                                    </button>
                                                </div>
                                            )}

                                            {/* Lista de Itens do Checklist */}
                                            <div className="space-y-1.5 max-h-40 overflow-y-auto custom-scrollbar pr-1">
                                                {((editingOp ? formData.items : tempChecklist) || []).map((item, index) => (
                                                    <div 
                                                        key={index} 
                                                        onClick={() => toggleItemChecked(index)}
                                                        className={`flex justify-between items-center p-2 rounded-xl border transition-all ${item.checked ? 'bg-emerald-50 border-emerald-100 text-emerald-900' : 'bg-white border-slate-200 text-slate-700'} ${userRole === 'almoxarifado' ? 'cursor-pointer hover:bg-slate-50' : ''}`}
                                                    >
                                                        <div className="flex items-center gap-2">
                                                            {userRole === 'almoxarifado' ? (
                                                                <span>
                                                                    {item.checked ? (
                                                                        <i data-lucide="check-square" className="w-4 h-4 text-emerald-600"></i>
                                                                    ) : (
                                                                        <i data-lucide="square" className="w-4 h-4 text-slate-400"></i>
                                                                    )}
                                                                </span>
                                                            ) : (
                                                                <span className="w-2 h-2 rounded-full bg-slate-400"></span>
                                                            )}
                                                            <span className="text-xs font-medium">{item.name}</span>
                                                        </div>
                                                        <div className="flex items-center gap-3">
                                                            <span className="text-xs font-bold px-2 py-0.5 bg-slate-100 rounded-full text-slate-600">{item.qtd} un</span>
                                                            {userRole === 'pcp' && (
                                                                <button 
                                                                    type="button" onClick={(e) => { e.stopPropagation(); removeChecklistItem(index); }}
                                                                    className="text-slate-400 hover:text-rose-600"
                                                                >
                                                                    <i data-lucide="trash-2" className="w-3.5 h-3.5"></i>
                                                                </button>
                                                            )}
                                                        </div>
                                                    </div>
                                                ))}

                                                {((editingOp ? formData.items : tempChecklist) || []).length === 0 && (
                                                    <p className="text-center text-slate-400 text-xs py-4">Nenhum aviamento adicionado ao checklist</p>
                                                )}
                                            </div>
                                        </div>

                                        {/* Bloco de Atuação Exclusiva do Almoxarifado */}
                                        {editingOp && (
                                            <div className="p-4 bg-slate-100 border border-slate-200 rounded-2xl space-y-3">
                                                <h4 className="text-xs font-bold text-slate-700 flex items-center gap-1.5">
                                                    <i data-lucide="user-check" className="w-4 h-4 text-slate-500"></i>
                                                    Tratativa do Almoxarifado
                                                </h4>
                                                <div className="space-y-3">
                                                    <div>
                                                        <label className="block text-[11px] font-semibold text-slate-600 mb-1">Status da Separação *</label>
                                                        <select 
                                                            className="w-full p-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white disabled:bg-slate-50 disabled:text-slate-500 disabled:cursor-not-allowed"
                                                            value={formData.status} 
                                                            onChange={e => setFormData({...formData, status: e.target.value})}
                                                            disabled={userRole !== 'almoxarifado'}
                                                        >
                                                            {statusOptions.map(opt => (
                                                                <option key={opt.id} value={opt.id}>{opt.label}</option>
                                                            ))}
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="block text-[11px] font-semibold text-slate-600 mb-1">Observações do Almoxarife (ex: "Falta zíper cor 12", "Em compra")</label>
                                                        <textarea 
                                                            rows="2" placeholder="Descreva os motivos de retenção..."
                                                            className="w-full p-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white disabled:bg-slate-50 disabled:text-slate-500 disabled:cursor-not-allowed"
                                                            value={formData.notes} 
                                                            onChange={e => setFormData({...formData, notes: e.target.value})}
                                                            disabled={userRole !== 'almoxarifado'}
                                                        ></textarea>
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        {!editingOp && (
                                            <div className="bg-blue-50 p-3 rounded-xl border border-blue-100 text-xs text-blue-800 flex items-start gap-2">
                                                <i data-lucide="info" className="w-4 h-4 flex-shrink-0 mt-0.5"></i>
                                                <p>Após salvar, este registro é lançado em tempo real na nuvem do Almoxarifado com o status <strong>Pendente</strong> e contagem regressiva baseada no Prazo Limite configurado.</p>
                                            </div>
                                        )}
                                    </form>
                                </div>
                                
                                <div className="px-6 py-4 border-t border-slate-100 bg-slate-50/50 flex justify-end gap-3 rounded-b-2xl">
                                    <button type="button" onClick={handleCloseModal} className="px-4 py-2 border border-slate-200 rounded-xl text-slate-700 bg-white hover:bg-slate-50 text-xs font-semibold transition-all">Cancelar</button>
                                    
                                    {/* Botão Salvar Dinâmico conforme regras de permissão */}
                                    {((userRole === 'pcp' && !editingOp) || (userRole === 'almoxarifado' && editingOp)) && (
                                        <button type="submit" form="opForm" className="px-4 py-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 text-xs font-semibold shadow-sm transition-all flex items-center gap-2 shadow-blue-100">
                                            <i data-lucide="save" className="w-4 h-4"></i> Gravar Alterações
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Rodapé Dinâmico: Diagnóstico de Conexão Firebase */}
                    <footer className="bg-slate-900 text-slate-400 py-3 px-6 text-xs flex justify-between items-center border-t border-slate-800">
                        <span>Fluxo de Aviamentos por OP &copy; 2026</span>
                        <div className="flex items-center gap-2">
                            {dbStatus === 'conectando' && (
                                <span className="flex items-center gap-1.5 text-amber-400">
                                    <span className="w-2 h-2 rounded-full bg-amber-400 animate-ping" />
                                    Autenticando...
                                </span>
                            )}
                            {dbStatus === 'online' && (
                                <span className="flex items-center gap-1.5 text-emerald-400">
                                    <span className="w-2 h-2 rounded-full bg-emerald-500" />
                                    Nuvem Conectada
                                </span>
                            )}
                            {dbStatus === 'error' && (
                                <span className="flex items-center gap-1.5 text-rose-400" title={authError}>
                                    <span className="w-2 h-2 rounded-full bg-rose-500 animate-pulse" />
                                    Erro no Banco
                                </span>
                            )}
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
