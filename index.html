<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Aviamentos por OP</title>
    
    <!-- Tailwind CSS para Estilização Premium -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (Ambiente de Produção Estável) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel para Transpilação do JSX no Navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- SDKs do Firebase v9 em Modo de Compatibilidade (Essencial para rodar em arquivo único) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <!-- Lucide Icons para Iconografia Moderna -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Fonte Inter (Padrão Industrial de Leitura de Tela) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.5; }
            100% { transform: scale(0.95); opacity: 1; }
        }
        .pulse-priority {
            animation: pulse-ring 2s infinite ease-in-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Configuração Real do seu Firebase (Integrada)
        const firebaseConfig = {
            apiKey: "AIzaSyDE5W2dSh9bdsds_E8_5Cvrr0KE2IOlzpI",
            authDomain: "almoxvt.firebaseapp.com",
            projectId: "almoxvt",
            storageBucket: "almoxvt.firebasestorage.app",
            messagingSenderId: "688995393151",
            appId: "1:688995393151:web:55ef061e6641f376b7294a",
            measurementId: "G-CJRY2BQWRH"
        };

        // Opções de status e cores padronizadas para o Chão de Fábrica
        const statusOptions = [
            { id: 'pendente', label: 'Pendente', color: 'bg-slate-100 text-slate-800 border-slate-300' },
            { id: 'em_separacao', label: 'Em Separação', color: 'bg-blue-100 text-blue-800 border-blue-300' },
            { id: 'aguardando_compra', label: 'Aguardando Compra', color: 'bg-yellow-100 text-yellow-800 border-yellow-300' },
            { id: 'parcial', label: 'Parcial (Faltam Itens)', color: 'bg-orange-100 text-orange-800 border-orange-300' },
            { id: 'completo', label: 'Kit Completo Separado', color: 'bg-emerald-100 text-emerald-800 border-emerald-300' }
        ];

        let db = null;
        let auth = null;
        let firebaseOnline = false;

        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            db = firebase.firestore();
            auth = firebase.auth();
            firebaseOnline = true;
        } catch (error) {
            console.warn("Falha ao inicializar o Firebase. Ativando contingência offline.", error);
        }

        // Formatação de data amigável para o chão de fábrica
        const formatDateTime = (dateString) => {
            if (!dateString) return '--';
            const date = new Date(dateString);
            return date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
        };

        const calculateSlaStatus = (deadline, completedTime) => {
            const now = new Date();
            const limit = new Date(deadline);
            
            if (completedTime) {
                const comp = new Date(completedTime);
                return comp <= limit ? { status: 'ok', text: 'No Prazo' } : { status: 'late', text: 'Entregue Atrasado' };
            }
            
            if (now > limit) {
                return { status: 'late', text: 'Atrasado' };
            }
            return { status: 'ok', text: 'No Prazo' };
        };

        const App = () => {
            const [ops, setOps] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingOp, setEditingOp] = useState(null);
            const [userRole, setUserRole] = useState('pcp'); 
            const [dbStatus, setDbStatus] = useState('conectando'); // 'conectando', 'online', 'offline'
            const [authError, setAuthError] = useState(null);
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [permissionDeniedError, setPermissionDeniedError] = useState(false);

            // Controle de Segurança e Modal de Validação de Senha do PCP
            const [passwordModal, setPasswordModal] = useState({ isOpen: false, type: '', password: '', error: '', actionData: null });

            // Form de criação/edição
            const [formData, setFormData] = useState({
                opNumber: '', model: '', faccaoDestino: '', status: 'pendente', notes: '', slaDeadline: '', isPriority: false, pdfBase64: '', pdfName: ''
            });

            // Gerenciador de itens rápidos do checklist no Almoxarifado
            const [newChecklistItem, setNewChecklistItem] = useState('');

            // Efeito para sincronizar ícones do Lucide sempre que a árvore renderizar
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            useEffect(() => {
                if (!firebaseOnline || !auth) {
                    setDbStatus('offline');
                    loadLocalData();
                    return;
                }

                auth.signInAnonymously()
                    .then(() => {
                        setIsAuthenticated(true);
                        setAuthError(null);
                    })
                    .catch((err) => {
                        console.error("Erro de Autenticação Firebase: ", err);
                        setAuthError(err.message);
                        setDbStatus('offline');
                        loadLocalData();
                    });
            }, []);

            useEffect(() => {
                if (!isAuthenticated || !db) return;

                setDbStatus('conectando');
                
                const unsubscribe = db.collection('ops_aviamentos')
                    .onSnapshot((snapshot) => {
                        const loadedOps = [];
                        snapshot.forEach(doc => {
                            loadedOps.push({ id: doc.id, ...doc.data() });
                        });
                        setOps(loadedOps);
                        setDbStatus('online');
                        setPermissionDeniedError(false);
                        // Sincroniza cache local para contingência futura
                        localStorage.setItem('ops_aviamentos_cache', JSON.stringify(loadedOps));
                    }, (error) => {
                        console.error("Erro ao ler banco de dados Firestore: ", error);
                        if (error.message.includes('permissions') || error.code === 'permission-denied') {
                            setPermissionDeniedError(true);
                        }
                        setDbStatus('offline');
                        loadLocalData();
                    });

                return () => unsubscribe();
            }, [isAuthenticated]);

            // Carregamento emergencial via LocalStorage
            const loadLocalData = () => {
                const cached = localStorage.getItem('ops_aviamentos_cache');
                if (cached) {
                    try {
                        setOps(JSON.parse(cached));
                    } catch (e) {
                        console.error("Erro ao decodificar cache local de dados.", e);
                    }
                }
            };

            const saveOpToDb = (updatedOp) => {
                if (dbStatus === 'online' && db) {
                    db.collection('ops_aviamentos').doc(updatedOp.id).set(updatedOp)
                        .catch(err => {
                            console.error("Erro ao salvar dados na nuvem, aplicando localmente.", err);
                            updateLocalState(updatedOp);
                        });
                } else {
                    updateLocalState(updatedOp);
                }
            };

            const updateLocalState = (updatedOp) => {
                const exist = ops.some(o => o.id === updatedOp.id);
                let newOps = [];
                if (exist) {
                    newOps = ops.map(o => o.id === updatedOp.id ? updatedOp : o);
                } else {
                    newOps = [...ops, updatedOp];
                }
                setOps(newOps);
                localStorage.setItem('ops_aviamentos_cache', JSON.stringify(newOps));
            };

            // Sugestão padrão automática de 24 horas úteis de SLA
            const getSuggestedSla = () => {
                const date = new Date();
                date.setHours(date.getHours() + 24);
                // Formato ISO local compatível com input datetime-local
                const tzOffset = date.getTimezoneOffset() * 60000;
                const localISOTime = (new Date(date - tzOffset)).toISOString().slice(0, 16);
                return localISOTime;
            };

            const handleOpenModal = (op = null) => {
                if (op) {
                    setEditingOp(op);
                    setFormData({
                        opNumber: op.opNumber || '',
                        model: op.model || '',
                        faccaoDestino: op.faccaoDestino || '',
                        status: op.status || 'pendente',
                        notes: op.notes || '',
                        slaDeadline: op.slaDeadline ? op.slaDeadline.slice(0, 16) : getSuggestedSla(),
                        isPriority: op.isPriority || false,
                        pdfBase64: op.pdfBase64 || '',
                        pdfName: op.pdfName || ''
                    });
                } else {
                    setEditingOp(null);
                    setFormData({ 
                        opNumber: '', 
                        model: '', 
                        faccaoDestino: '', 
                        status: 'pendente', 
                        notes: '', 
                        slaDeadline: getSuggestedSla(),
                        isPriority: false,
                        pdfBase64: '',
                        pdfName: ''
                    });
                }
                setIsModalOpen(true);
            };

            const handleCloseModal = () => {
                setIsModalOpen(false);
                setEditingOp(null);
            };

            // Conversor Inteligente de PDF para Armazenamento Base64 (Com limitador de 800KB para evitar estouro de banda)
            const handlePdfUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (file.type !== "application/pdf") {
                    alert("Apenas arquivos no formato PDF são aceitos!");
                    e.target.value = '';
                    return;
                }

                if (file.size > 800 * 1024) { // Limite estrito de 800KB
                    alert("O arquivo PDF ultrapassou o limite máximo de segurança de 800KB. Reduza a resolução e anexe novamente!");
                    e.target.value = '';
                    return;
                }

                const reader = new FileReader();
                reader.onload = () => {
                    setFormData(prev => ({
                        ...prev,
                        pdfBase64: reader.result,
                        pdfName: file.name
                    }));
                };
                reader.readAsDataURL(file);
            };

            const triggerPasswordCheck = (type, actionData = null) => {
                setPasswordModal({
                    isOpen: true,
                    type: type,
                    password: '',
                    error: '',
                    actionData: actionData
                });
            };

            const handleVerifyPassword = (e) => {
                e.preventDefault();
                if (passwordModal.password !== '123456') {
                    setPasswordModal(prev => ({ ...prev, error: 'Senha do PCP incorreta! Ação não autorizada.' }));
                    return;
                }

                // Senha Correta -> Executa a ação pendente
                const action = passwordModal.type;
                const data = passwordModal.actionData;

                // Fecha modal de verificação
                setPasswordModal({ isOpen: false, type: '', password: '', error: '', actionData: null });

                if (action === 'delete') {
                    executeDeleteOp(data.id);
                } else if (action === 'allow_edit') {
                    // Abre modo de edição irrestrito no formulário para o PCP
                    setEditingOp(data);
                    setFormData({
                        opNumber: data.opNumber || '',
                        model: data.model || '',
                        faccaoDestino: data.faccaoDestino || '',
                        status: data.status || 'pendente',
                        notes: data.notes || '',
                        slaDeadline: data.slaDeadline ? data.slaDeadline.slice(0, 16) : getSuggestedSla(),
                        isPriority: data.isPriority || false,
                        pdfBase64: data.pdfBase64 || '',
                        pdfName: data.pdfName || ''
                    });
                } else if (action === 'save_edit') {
                    executeSaveOp(data);
                }
            };

            const executeDeleteOp = (opId) => {
                if (dbStatus === 'online' && db) {
                    db.collection('ops_aviamentos').doc(opId).delete()
                        .then(() => handleCloseModal())
                        .catch(err => console.error("Erro ao deletar OP na nuvem: ", err));
                } else {
                    const newOps = ops.filter(o => o.id !== opId);
                    setOps(newOps);
                    localStorage.setItem('ops_aviamentos_cache', JSON.stringify(newOps));
                    handleCloseModal();
                }
            };

            const handleSaveOp = (e) => {
                e.preventDefault();
                const now = new Date();
                
                // Formatação correta para salvar o prazo digitado
                const formattedDeadline = new Date(formData.slaDeadline).toISOString();

                if (editingOp) {
                    // Se estivermos editando e for alteração de PCP, exige a senha para salvar
                    if (userRole === 'pcp') {
                        triggerPasswordCheck('save_edit', { ...editingOp, ...formData, slaDeadline: formattedDeadline });
                    } else {
                        // Se for almoxarifado, salva direto (apenas status/observações/checklist estão liberados de qualquer forma)
                        executeSaveOp({ ...editingOp, ...formData, slaDeadline: formattedDeadline });
                    }
                } else {
                    // Criar Nova OP (Sem senha necessária para criar do zero)
                    const newOp = {
                        id: `sol-${Date.now()}`,
                        opNumber: formData.opNumber,
                        model: formData.model,
                        faccaoDestino: formData.faccaoDestino,
                        status: 'pendente',
                        notes: formData.notes,
                        requestTime: now.toISOString(),
                        slaDeadline: formattedDeadline,
                        completedTime: null,
                        isPriority: formData.isPriority,
                        pdfBase64: formData.pdfBase64,
                        pdfName: formData.pdfName,
                        items: []
                    };
                    saveOpToDb(newOp);
                    handleCloseModal();
                }
            };

            const executeSaveOp = (opToSave) => {
                const now = new Date();
                let finalOp = { ...opToSave };

                // Define carimbo de tempo caso mude para o status de 'completo'
                if (opToSave.status === 'completo') {
                    finalOp.completedTime = now.toISOString();
                } else {
                    finalOp.completedTime = null;
                }

                saveOpToDb(finalOp);
                handleCloseModal();
            };

            const handleToggleChecklistItem = (itemIndex) => {
                if (!editingOp) return;
                const updatedItems = [...(editingOp.items || [])];
                updatedItems[itemIndex].checked = !updatedItems[itemIndex].checked;

                const updatedOp = { ...editingOp, items: updatedItems };
                setEditingOp(updatedOp);
                saveOpToDb(updatedOp);
            };

            const handleAddChecklistItem = (e) => {
                e.preventDefault();
                if (!newChecklistItem.trim() || !editingOp) return;

                const updatedItems = [...(editingOp.items || []), { name: newChecklistItem.trim(), checked: false }];
                const updatedOp = { ...editingOp, items: updatedItems };
                
                setEditingOp(updatedOp);
                saveOpToDb(updatedOp);
                setNewChecklistItem('');
            };

            const handleRemoveChecklistItem = (itemIndex) => {
                if (!editingOp) return;
                const updatedItems = (editingOp.items || []).filter((_, idx) => idx !== itemIndex);
                const updatedOp = { ...editingOp, items: updatedItems };
                
                setEditingOp(updatedOp);
                saveOpToDb(updatedOp);
            };

            // Regra de arquivamento automático após 24 horas de kit completo para liberar espaço visual
            const isCompletedAndOld = (op) => {
                if (op.status !== 'completo' || !op.completedTime) return false;
                const completedAt = new Date(op.completedTime).getTime();
                const now = new Date().getTime();
                const hoursPassed = (now - completedAt) / (1000 * 60 * 60);
                return hoursPassed >= 24; 
            };

            const visibleOps = ops.filter(op => !isCompletedAndOld(op));

            // Filtro de buscas de topo
            const filteredOps = visibleOps.filter(op => 
                (op.opNumber || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
                (op.model || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
                (op.faccaoDestino || '').toLowerCase().includes(searchTerm.toLowerCase())
            );

            // KPIs unificados de controle
            const totalOps = visibleOps.length;
            const completedOps = visibleOps.filter(op => op.status === 'completo').length;
            const pendingOps = totalOps - completedOps;
            const lateOps = visibleOps.filter(op => calculateSlaStatus(op.slaDeadline, op.completedTime).status === 'late' && op.status !== 'completo').length;

            const renderCard = (op) => {
                const sla = calculateSlaStatus(op.slaDeadline, op.completedTime);
                const isLate = sla.status === 'late' && op.status !== 'completo';

                return (
                    <div 
                        key={op.id} 
                        onClick={() => handleOpenModal(op)}
                        className={`bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition-all cursor-pointer border-2 relative overflow-hidden mb-3 ${
                            op.isPriority 
                            ? 'border-amber-400 bg-gradient-to-br from-amber-50/30 to-white shadow-amber-100/50' 
                            : 'border-slate-100 hover:border-slate-300'
                        }`}
                    >
                        {/* Indicador de Prioridade Máxima */}
                        {op.isPriority && (
                            <div className="absolute top-0 left-0 right-0 h-1 bg-amber-400"></div>
                        )}

                        <div className="flex justify-between items-start mb-2">
                            <div className="flex items-center gap-1.5">
                                <h4 className="font-bold text-slate-800 text-sm">{op.opNumber}</h4>
                                {op.isPriority && (
                                    <span className="bg-amber-100 text-amber-800 text-[10px] font-bold px-1.5 py-0.5 rounded flex items-center gap-0.5">
                                        <i data-lucide="zap" className="w-2.5 h-2.5 fill-amber-500 text-amber-500"></i> PRIORITÁRIO
                                    </span>
                                )}
                            </div>
                            
                            <span className={`text-[10px] px-2 py-0.5 rounded-full font-semibold ${
                                isLate 
                                ? 'bg-red-100 text-red-700 animate-pulse' 
                                : op.status === 'completo' 
                                ? 'bg-emerald-100 text-emerald-700' 
                                : 'bg-slate-100 text-slate-700'
                            }`}>
                                {sla.text}
                            </span>
                        </div>
                        
                        <p className="text-xs font-semibold text-slate-600 mb-1 line-clamp-1">{op.model}</p>
                        
                        <p className="text-[11px] text-slate-500 mb-3 flex items-center gap-1">
                            <i data-lucide="truck" className="w-3 h-3"></i> {op.faccaoDestino || 'Setor Interno'}
                        </p>

                        <div className="text-[10px] text-slate-400 space-y-0.5 border-t border-slate-50 pt-2 mb-2">
                            <div className="flex items-center gap-1">
                                <i data-lucide="calendar" className="w-3 h-3"></i> Solicitado: {formatDateTime(op.requestTime)}
                            </div>
                            <div className="flex items-center gap-1 font-medium text-slate-500">
                                <i data-lucide="alarm-clock" className="w-3 h-3 text-slate-400"></i> Limite: {formatDateTime(op.slaDeadline)}
                            </div>
                        </div>

                        {/* Indicador se possui PDF anexo */}
                        {op.pdfBase64 && (
                            <div className="mt-1 mb-2 inline-flex items-center gap-1 text-[10px] text-blue-600 font-semibold bg-blue-50 px-2 py-0.5 rounded">
                                <i data-lucide="file-text" className="w-3 h-3"></i> Ficha Técnica PDF
                            </div>
                        )}

                        {/* Barra de Progresso do Checklist de Separação */}
                        {op.items && op.items.length > 0 && (
                            <div className="mt-2">
                                <div className="flex justify-between text-[10px] text-slate-500 mb-1 font-medium">
                                    <span>Checklist Aviamento</span>
                                    <span>{op.items.filter(i => i.checked).length}/{op.items.length} itens</span>
                                </div>
                                <div className="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                                    <div 
                                        className="bg-emerald-500 h-1.5 transition-all duration-300" 
                                        style={{ width: `${(op.items.filter(i => i.checked).length / op.items.length) * 100}%` }}
                                    ></div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col">
                    
                    {/* Alerta inteligente de bloqueio de Referer (Domínio de Teste Bloqueado pelo GCP) */}
                    {authError && (authError.includes('requests-from-referer') || authError.includes('blocked')) && (
                        <div className="bg-blue-50 border-b border-blue-200 p-4">
                            <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                                <div className="flex items-start gap-3">
                                    <div className="p-2 bg-blue-100 rounded-lg text-blue-800">
                                        <i data-lucide="lock" className="w-5 h-5"></i>
                                    </div>
                                    <div>
                                        <h3 className="text-sm font-bold text-blue-900">Segurança Ativa: Chave de API Protegida</h3>
                                        <p className="text-xs text-blue-700 mt-0.5">
                                            O Google bloqueou a conexão porque este ambiente de teste (Preview) não está autorizado nas credenciais do seu Google Cloud. 
                                            <strong> Isso é excelente!</strong> Significa que suas restrições de segurança estão funcionando. O app ativou a <strong>Contingência Local</strong> para que você teste aqui normalmente.
                                        </p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-2">
                                    <span className="bg-blue-100 text-blue-800 text-[10px] font-bold px-2.5 py-1 rounded-full">
                                        Segurança OK
                                    </span>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Alerta inteligente de permissão de segurança do Firebase */}
                    {permissionDeniedError && (
                        <div className="bg-amber-50 border-b border-amber-200 p-4">
                            <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                                <div className="flex items-start gap-3">
                                    <div className="p-2 bg-amber-100 rounded-lg text-amber-800">
                                        <i data-lucide="alert-triangle" className="w-5 h-5"></i>
                                    </div>
                                    <div>
                                        <h3 className="text-sm font-bold text-amber-900">Modo de Operação Local Ativado</h3>
                                        <p className="text-xs text-amber-700 mt-0.5">
                                            As regras de segurança do seu banco Firestore no Modo Produção ainda estão bloqueando o tráfego externo. 
                                            Para colocar em nuvem, acesse a aba <strong>Rules</strong> do seu console e mude para <code>allow read, write: if request.auth != null;</code>.
                                        </p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-2">
                                    <span className="bg-amber-100 text-amber-800 text-[10px] font-bold px-2.5 py-1 rounded-full">
                                        Falta Configuração
                                    </span>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Header Principal */}
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-10 px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 p-2 rounded-xl text-white shadow-lg shadow-blue-100">
                                <i data-lucide="package" className="w-6 h-6"></i>
                            </div>
                            <div>
                                <h1 className="text-lg font-bold text-slate-800 leading-tight">Almoxarifado Flow</h1>
                                <p className="text-xs text-slate-400">Gestão de Aviamentos por OP</p>
                            </div>
                        </div>

                        <div className="flex flex-wrap gap-3 items-center w-full md:w-auto justify-end">
                            {/* Chave de Atuação (PCP ou Almoxarifado) */}
                            <div className="flex items-center bg-slate-100 p-1 rounded-xl border border-slate-200">
                                <button 
                                    onClick={() => setUserRole('pcp')}
                                    className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all flex items-center gap-1.5 ${userRole === 'pcp' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-800'}`}
                                >
                                    <i data-lucide="layers" className="w-3.5 h-3.5"></i> PCP / Planejamento
                                </button>
                                <button 
                                    onClick={() => setUserRole('almoxarifado')}
                                    className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all flex items-center gap-1.5 ${userRole === 'almoxarifado' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-800'}`}
                                >
                                    <i data-lucide="check-square" className="w-3.5 h-3.5"></i> Almoxarifado
                                </button>
                            </div>

                            {/* Input de Pesquisas */}
                            <div className="relative w-full md:w-64">
                                <i data-lucide="search" className="w-4 h-4 absolute left-3 top-2.5 text-slate-400"></i>
                                <input 
                                    type="text" 
                                    placeholder="Buscar OP, Modelo, Destino..." 
                                    className="pl-9 pr-4 py-2 border border-slate-200 bg-slate-50 rounded-lg text-xs focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none w-full"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                            
                            {userRole === 'pcp' && (
                                <button 
                                    onClick={() => handleOpenModal()}
                                    className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-xs font-bold transition-all flex items-center gap-1.5 shadow-md shadow-blue-100">
                                    <i data-lucide="plus" className="w-4 h-4"></i> Nova OP
                                </button>
                            )}
                        </div>
                    </header>

                    {/* Grid de KPIs no Chão de Fábrica */}
                    <main className="flex-1 p-6 flex flex-col">
                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                            <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                                <div className="p-3 bg-blue-50 rounded-xl text-blue-600"><i data-lucide="file-text" className="w-5 h-5"></i></div>
                                <div><p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Ativas na Fila</p><p className="text-xl font-extrabold text-slate-800">{totalOps}</p></div>
                            </div>
                            <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                                <div className="p-3 bg-yellow-50 rounded-xl text-yellow-600"><i data-lucide="timer" className="w-5 h-5"></i></div>
                                <div><p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Pendentes</p><p className="text-xl font-extrabold text-slate-800">{pendingOps}</p></div>
                            </div>
                            <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                                <div className="p-3 bg-red-50 rounded-xl text-red-600"><i data-lucide="alert-octagon" className="w-5 h-5"></i></div>
                                <div><p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Atrasadas (SLA)</p><p className="text-xl font-extrabold text-slate-800">{lateOps}</p></div>
                            </div>
                            <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                                <div className="p-3 bg-emerald-50 rounded-xl text-emerald-600"><i data-lucide="check-circle-2" className="w-5 h-5"></i></div>
                                <div><p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Prontos / Saídos</p><p className="text-xl font-extrabold text-slate-800">{completedOps}</p></div>
                            </div>
                        </div>

                        {/* Kanban Principal */}
                        <div className="flex-1 overflow-x-auto pb-4 custom-scrollbar">
                            <div className="flex gap-6 h-full items-start min-w-[1200px]">
                                
                                {}
                                {statusOptions.map(status => {
                                    // Filtragem e ordenação estrita por prioridade e depois prazo
                                    const colOps = filteredOps
                                        .filter(op => op.status === status.id)
                                        .sort((a, b) => {
                                            // Se um for prioridade e outro não, prioridade vai primeiro
                                            if (a.isPriority && !b.isPriority) return -1;
                                            if (!a.isPriority && b.isPriority) return 1;
                                            // Se empatar na prioridade, ordena pelo prazo mais próximo primeiro
                                            return new Date(a.slaDeadline) - new Date(b.slaDeadline);
                                        });

                                    return (
                                        <div key={status.id} className="w-80 flex flex-col bg-slate-50 border border-slate-200 rounded-2xl h-[calc(100vh-280px)] min-h-[450px]">
                                            <div className="p-3 border-b border-slate-200 flex justify-between items-center bg-slate-100 rounded-t-2xl">
                                                <h3 className="font-bold text-slate-700 text-xs flex items-center gap-2">
                                                    <span className={`w-2.5 h-2.5 rounded-full ${status.color.split(' ')[0]}`}></span>
                                                    {status.label}
                                                </h3>
                                                <span className="bg-slate-200 text-slate-600 text-[10px] py-0.5 px-2 rounded-full font-bold">{colOps.length}</span>
                                            </div>
                                            <div className="p-3 overflow-y-auto flex-1 custom-scrollbar">
                                                {colOps.map(op => renderCard(op))}
                                                {colOps.length === 0 && (
                                                    <div className="text-center py-12 text-slate-400 text-xs border-2 border-dashed border-slate-200 rounded-xl bg-white/50">
                                                        Nenhuma OP nesta etapa
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )
                                })}

                            </div>
                        </div>
                    </main>

                    {/* Rodapé Dinâmico com Indicador de Conexão */}
                    <footer className="bg-white border-t border-slate-200 px-6 py-3 flex justify-between items-center text-xs text-slate-400">
                        <div className="flex items-center gap-2">
                            <span className={`w-2.5 h-2.5 rounded-full ${
                                dbStatus === 'online' ? 'bg-emerald-500' : 'bg-amber-500 animate-pulse'
                            }`}></span>
                            <span className="font-semibold text-slate-500">
                                {dbStatus === 'online' ? 'Nuvem Conectada (Realtime)' : 'Modo Contingência (Offline / Local)'}
                            </span>
                        </div>
                        <div>
                            <span className="font-bold text-slate-500 uppercase">Perfil Ativo: {userRole === 'pcp' ? 'PCP' : 'Almoxarifado'}</span>
                        </div>
                    </footer>

                    {}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                    <h2 className="text-sm font-extrabold text-slate-800 uppercase tracking-wider flex items-center gap-2">
                                        <i data-lucide="edit-3" className="w-4 h-4"></i>
                                        {editingOp ? `Gerenciar Solicitação: ${editingOp.opNumber}` : 'Nova Ordem de Aviamento'}
                                    </h2>
                                    <button onClick={handleCloseModal} className="text-slate-400 hover:text-slate-600 transition-colors">
                                        <i data-lucide="x" className="w-5 h-5"></i>
                                    </button>
                                </div>
                                
                                <div className="p-6 overflow-y-auto flex-1 space-y-5">
                                    
                                    {/* Botões de exclusão e edição sob controle PCP */}
                                    {editingOp && userRole === 'pcp' && (
                                        <div className="flex justify-between items-center p-3 bg-red-50 border border-red-100 rounded-xl">
                                            <div className="text-xs text-red-800">
                                                <strong>Controle de Ciclo de Vida:</strong> Exclua ou gerencie o cadastro original desta solicitação.
                                            </div>
                                            <div className="flex gap-2">
                                                <button 
                                                    type="button"
                                                    onClick={() => triggerPasswordCheck('allow_edit', editingOp)}
                                                    className="px-3 py-1.5 bg-white border border-red-200 text-red-700 text-xs font-bold rounded-lg hover:bg-red-100 flex items-center gap-1"
                                                >
                                                    <i data-lucide="lock" className="w-3.5 h-3.5"></i> Liberar Edição
                                                </button>
                                                <button 
                                                    type="button"
                                                    onClick={() => triggerPasswordCheck('delete', editingOp)}
                                                    className="px-3 py-1.5 bg-red-600 text-white text-xs font-bold rounded-lg hover:bg-red-700 flex items-center gap-1 shadow-sm"
                                                >
                                                    <i data-lucide="trash-2" className="w-3.5 h-3.5"></i> Excluir OP
                                                </button>
                                            </div>
                                        </div>
                                    )}

                                    <form id="opForm" onSubmit={handleSaveOp} className="space-y-4">
                                        
                                        {/* Inputs bloqueados para o Almoxarifado para preservar consistência do PCP */}
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Número da OP *</label>
                                                <input 
                                                    type="text" required placeholder="Ex: OP-4780"
                                                    className="w-full p-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none disabled:bg-slate-50 disabled:text-slate-400"
                                                    value={formData.opNumber} 
                                                    onChange={e => setFormData({...formData, opNumber: e.target.value})}
                                                    disabled={!!editingOp || userRole !== 'pcp'}
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Modelo / Referência *</label>
                                                <input 
                                                    type="text" required placeholder="Ex: Camisa Social Slim"
                                                    className="w-full p-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none disabled:bg-slate-50 disabled:text-slate-400"
                                                    value={formData.model} 
                                                    onChange={e => setFormData({...formData, model: e.target.value})}
                                                    disabled={!!editingOp || userRole !== 'pcp'}
                                                />
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Fração / Facção de Destino *</label>
                                                <input 
                                                    type="text" required placeholder="Ex: Oficina Estrela da Costura"
                                                    className="w-full p-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none disabled:bg-slate-50 disabled:text-slate-400"
                                                    value={formData.faccaoDestino} 
                                                    onChange={e => setFormData({...formData, faccaoDestino: e.target.value})}
                                                    disabled={userRole !== 'pcp'}
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Data e Hora de Entrega (SLA) *</label>
                                                <input 
                                                    type="datetime-local" required
                                                    className="w-full p-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none disabled:bg-slate-50 disabled:text-slate-400"
                                                    value={formData.slaDeadline} 
                                                    onChange={e => setFormData({...formData, slaDeadline: e.target.value})}
                                                    disabled={userRole !== 'pcp'}
                                                />
                                            </div>
                                        </div>

                                        {/* Upload de Ficha Técnica / PDF da OP */}
                                        {userRole === 'pcp' && !editingOp && (
                                            <div className="p-3 bg-slate-50 rounded-xl border border-slate-200">
                                                <label className="block text-xs font-bold text-slate-600 uppercase mb-1 flex items-center gap-1.5">
                                                    <i data-lucide="file-plus" className="w-4 h-4"></i> Anexar PDF da OP / Ficha Técnica (Max 800KB)
                                                </label>
                                                <input 
                                                    type="file" 
                                                    accept=".pdf"
                                                    onChange={handlePdfUpload}
                                                    className="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer"
                                                />
                                                {formData.pdfName && (
                                                    <div className="mt-2 text-[11px] text-emerald-600 font-bold flex items-center gap-1">
                                                        <i data-lucide="check-circle-2" className="w-3.5 h-3.5"></i> PDF Pronto: {formData.pdfName}
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {/* Seletor de Prioridade do PCP */}
                                        {userRole === 'pcp' && !editingOp && (
                                            <div className="flex items-center gap-2 p-3 bg-amber-50 rounded-xl border border-amber-200">
                                                <input 
                                                    type="checkbox" 
                                                    id="priorityCheckbox"
                                                    className="w-4 h-4 text-amber-600 border-amber-300 rounded focus:ring-amber-500 cursor-pointer"
                                                    checked={formData.isPriority}
                                                    onChange={e => setFormData({...formData, isPriority: e.target.checked})}
                                                />
                                                <label htmlFor="priorityCheckbox" className="text-xs font-bold text-amber-900 cursor-pointer flex items-center gap-1 select-none">
                                                    <i data-lucide="zap" className="w-4 h-4 fill-amber-500 text-amber-500"></i> Marcar como PRIORIDADE MÁXIMA (Urgente)
                                                </label>
                                            </div>
                                        )}

                                        {/* Botão de Visualização Dinâmica do PDF anexado */}
                                        {editingOp && editingOp.pdfBase64 && (
                                            <div className="p-3 bg-blue-50 border border-blue-100 rounded-xl flex justify-between items-center">
                                                <div className="text-xs text-blue-800 font-semibold flex items-center gap-1.5">
                                                    <i data-lucide="file-text" className="w-4 h-4"></i> {editingOp.pdfName || "Ficha_Tecnica.pdf"}
                                                </div>
                                                <a 
                                                    href={editingOp.pdfBase64} 
                                                    target="_blank" 
                                                    rel="noopener noreferrer"
                                                    className="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold rounded-lg flex items-center gap-1 shadow-sm transition-all"
                                                >
                                                    <i data-lucide="eye" className="w-3.5 h-3.5"></i> Visualizar Ficha Técnica
                                                </a>
                                            </div>
                                        )}

                                        {}
                                        {editingOp && (
                                            <div className="p-4 bg-slate-50 border border-slate-200 rounded-xl space-y-4">
                                                <h4 className="text-xs font-bold text-slate-700 uppercase tracking-wider flex items-center gap-1.5 border-b border-slate-200 pb-2">
                                                    <i data-lucide="sliders" className="w-4 h-4"></i> Painel Operacional de Separação
                                                </h4>
                                                
                                                <div>
                                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Status da Separação *</label>
                                                    <select 
                                                        className="w-full p-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white disabled:bg-slate-100 disabled:text-slate-400 disabled:cursor-not-allowed"
                                                        value={formData.status} 
                                                        onChange={e => setFormData({...formData, status: e.target.value})}
                                                        disabled={userRole !== 'almoxarifado'}
                                                    >
                                                        {statusOptions.map(opt => (
                                                            <option key={opt.id} value={opt.id}>{opt.label}</option>
                                                        ))}
                                                    </select>
                                                </div>

                                                <div>
                                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Faltas / Ocorrências / Motivo de Atrasos</label>
                                                    <textarea 
                                                        rows="2" placeholder="Descreva os aviamentos faltantes ou motivos de parada..."
                                                        className="w-full p-2.5 border border-slate-200 rounded-xl text-xs focus:ring-2 focus:ring-blue-500 outline-none bg-white disabled:bg-slate-100 disabled:text-slate-400 disabled:cursor-not-allowed"
                                                        value={formData.notes} 
                                                        onChange={e => setFormData({...formData, notes: e.target.value})}
                                                        disabled={userRole !== 'almoxarifado'}
                                                    ></textarea>
                                                </div>

                                                {/* Checklist Físico Customizável da OP */}
                                                <div className="border-t border-slate-200 pt-3">
                                                    <label className="block text-xs font-bold text-slate-600 uppercase mb-2">Checklist de Separação dos Itens</label>
                                                    
                                                    {userRole === 'almoxarifado' && (
                                                        <form onSubmit={handleAddChecklistItem} className="flex gap-2 mb-3">
                                                            <input 
                                                                type="text" 
                                                                placeholder="Adicionar aviamento (Ex: Zíper 15cm)..."
                                                                className="flex-1 p-2 border border-slate-200 rounded-lg text-xs outline-none focus:ring-2 focus:ring-blue-500"
                                                                value={newChecklistItem}
                                                                onChange={e => setNewChecklistItem(e.target.value)}
                                                            />
                                                            <button 
                                                                type="button"
                                                                onClick={handleAddChecklistItem}
                                                                className="bg-slate-800 hover:bg-slate-900 text-white text-xs px-3 rounded-lg font-bold flex items-center gap-1"
                                                            >
                                                                <i data-lucide="plus" className="w-4 h-4"></i> Inserir
                                                            </button>
                                                        </form>
                                                    )}

                                                    <div className="space-y-1.5 max-h-48 overflow-y-auto custom-scrollbar">
                                                        {(editingOp.items || []).map((item, index) => (
                                                            <div key={index} className="flex justify-between items-center bg-white p-2 rounded-lg border border-slate-100">
                                                                <label className="flex items-center gap-2 cursor-pointer select-none text-xs flex-1">
                                                                    <input 
                                                                        type="checkbox" 
                                                                        className="w-3.5 h-3.5 rounded text-emerald-600 border-slate-300 focus:ring-emerald-500 cursor-pointer disabled:cursor-not-allowed"
                                                                        checked={item.checked}
                                                                        onChange={() => handleToggleChecklistItem(index)}
                                                                        disabled={userRole !== 'almoxarifado'}
                                                                    />
                                                                    <span className={item.checked ? 'line-through text-slate-400' : 'text-slate-700 font-semibold'}>
                                                                        {item.name}
                                                                    </span>
                                                                </label>
                                                                {userRole === 'almoxarifado' && (
                                                                    <button 
                                                                        type="button"
                                                                        onClick={() => handleRemoveChecklistItem(index)}
                                                                        className="text-red-400 hover:text-red-600 p-1"
                                                                    >
                                                                        <i data-lucide="trash-2" className="w-3.5 h-3.5"></i>
                                                                    </button>
                                                                )}
                                                            </div>
                                                        ))}
                                                        {(editingOp.items || []).length === 0 && (
                                                            <div className="text-center py-4 text-slate-400 text-xs italic bg-white rounded-lg border border-slate-100">
                                                                {userRole === 'almoxarifado' ? 'Adicione acima as necessidades da OP.' : 'Nenhum item cadastrado pelo almoxarifado.'}
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </form>
                                </div>
                                
                                <div className="px-6 py-4 border-t border-slate-100 bg-slate-50 flex justify-end gap-3 rounded-b-2xl">
                                    <button type="button" onClick={handleCloseModal} className="px-4 py-2 border border-slate-200 rounded-xl text-slate-700 bg-white hover:bg-slate-100 text-xs font-bold transition-all">Cancelar</button>
                                    
                                    {/* Apenas exibe o botão Salvar se o usuário tiver as permissões devidas do respectivo perfil */}
                                    {((userRole === 'pcp' && !editingOp) || (userRole === 'pcp' && editingOp) || (userRole === 'almoxarifado' && editingOp)) && (
                                        <button type="submit" form="opForm" className="px-4 py-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 text-xs font-bold shadow-md shadow-blue-100 flex items-center gap-1.5 transition-all">
                                            <i data-lucide="save" className="w-4 h-4"></i> Salvar Solicitação
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {}
                    {passwordModal.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden border border-slate-200">
                                <div className="px-5 py-4 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                                    <h3 className="text-xs font-black text-slate-800 uppercase tracking-widest flex items-center gap-1.5">
                                        <i data-lucide="shield-alert" className="w-4.5 h-4.5 text-red-500"></i> Autenticação PCP
                                    </h3>
                                    <button 
                                        onClick={() => setPasswordModal({ isOpen: false, type: '', password: '', error: '', actionData: null })}
                                        className="text-slate-400 hover:text-slate-600"
                                    >
                                        <i data-lucide="x" className="w-4 h-4"></i>
                                    </button>
                                </div>
                                <form onSubmit={handleVerifyPassword} className="p-5 space-y-4">
                                    <p className="text-xs text-slate-500">
                                        Esta ação altera a estrutura original do PCP. Digite a senha master de liberação para prosseguir:
                                    </p>
                                    <div>
                                        <input 
                                            type="password" required autoFocus placeholder="Digite a senha..."
                                            className="w-full p-2.5 border border-slate-200 rounded-xl text-center text-sm font-bold tracking-widest focus:ring-2 focus:ring-blue-500 outline-none"
                                            value={passwordModal.password}
                                            onChange={e => setPasswordModal({ ...passwordModal, password: e.target.value })}
                                        />
                                    </div>
                                    {passwordModal.error && (
                                        <div className="text-[10px] text-red-600 font-bold bg-red-50 p-2 rounded-lg text-center">
                                            {passwordModal.error}
                                        </div>
                                    )}
                                    <div className="flex gap-2">
                                        <button 
                                            type="button"
                                            onClick={() => setPasswordModal({ isOpen: false, type: '', password: '', error: '', actionData: null })}
                                            className="flex-1 py-2 border border-slate-200 rounded-xl text-xs font-bold text-slate-500 hover:bg-slate-50"
                                        >
                                            Cancelar
                                        </button>
                                        <button 
                                            type="submit"
                                            className="flex-1 py-2 bg-slate-800 hover:bg-slate-900 text-white rounded-xl text-xs font-bold"
                                        >
                                            Confirmar
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        // Renderização Final da árvore React na raiz HTML
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
